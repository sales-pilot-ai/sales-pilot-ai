<section class="sales-management" id="sales-management-root">
  <div class="sales-tabs" id="sales-tabs">
    <button type="button" class="sales-tabs__tab is-active" data-sales-tab="list">営業リスト</button>
    <button type="button" class="sales-tabs__tab" data-sales-tab="send">
      一括送信 <span class="sales-tabs__badge" id="send-tab-badge" hidden>0</span>
    </button>
    <button type="button" class="sales-tabs__tab" data-sales-tab="reply">
      返信確認 <span class="sales-tabs__badge" id="reply-tab-badge" hidden>0</span>
    </button>
  </div>

<div class="company-list sales-tab-panel" id="company-list-root">
  <div class="company-list__status-undo-bar" id="status-undo-bar" hidden>
    <span>ステータスを更新しました。</span>
    <button type="button" class="button button--secondary" id="status-undo-button">元に戻す</button>
  </div>

  <form id="filter-form" class="company-list__filters">
    <input type="text" id="filter-keyword" placeholder="会社名・住所で検索" />
    <select id="filter-industry">
      <option value="">業種（すべて）</option>
    </select>
    <select id="filter-send-status">
      <option value="">送信状況（すべて）</option>
      <option value="未送信">未送信</option>
      <option value="送信済">送信済</option>
      <option value="送信失敗">送信失敗</option>
      <option value="返信あり">返信あり</option>
      <option value="配信停止">配信停止</option>
    </select>
    <select id="filter-send-approval">
      <option value="">送信可否（すべて）</option>
      <option value="○">○</option>
      <option value="×">×</option>
    </select>
    <button type="submit" class="button">絞り込む</button>
    <a class="button button--secondary" href="#" data-page="search">企業検索へ</a>
    <button type="button" class="button button--secondary" id="bulk-send-button">一括送信</button>
    <button type="button" class="button button--secondary" id="reply-sync-button">返信確認</button>
  </form>

  <div class="company-list__status-filter" id="status-filter">
    <button type="button" class="button button--secondary is-active" data-status-filter="all">すべて</button>
    <button type="button" class="button button--secondary" data-status-filter="pendingSend">送信待ち</button>
    <button type="button" class="button button--secondary" data-status-filter="replied">返信あり</button>
    <button type="button" class="button button--secondary" data-status-filter="inNegotiation">商談中</button>
    <button type="button" class="button button--secondary" data-status-filter="todayMeeting">本日商談</button>
    <button type="button" class="button button--secondary" data-status-filter="won">成約</button>
  </div>

  <div class="company-list__selection">
    <span id="selection-count">選択中：0件</span>
    <div id="bulk-analyze-progress" class="company-list__bulk-progress" hidden>
      <span id="bulk-progress-label" class="company-list__bulk-progress-label"></span>
      <div class="progress-bar" id="bulk-progress-bar" role="progressbar" aria-label="処理の進捗" aria-valuemin="0" aria-valuemax="100">
        <div class="progress-bar__fill" id="bulk-progress-fill"></div>
      </div>
    </div>
    <div class="company-list__bulk-actions" id="bulk-action-bar" hidden>
      <button type="button" class="button button--secondary" data-bulk-action="analyze">AI分析</button>
      <button type="button" class="button button--secondary" data-bulk-action="send">送信</button>
      <button type="button" class="button button--secondary" data-bulk-action="status">ステータス変更</button>
    </div>
  </div>

  <p id="list-loading" class="empty-state">読み込み中…</p>
  <p id="list-error" class="error-message" hidden></p>
  <p id="list-empty" class="empty-state" hidden>該当する企業がありません。</p>

  <table class="company-table" id="company-table" hidden>
    <thead>
      <tr>
        <th><input type="checkbox" id="select-all-checkbox" aria-label="全選択" /></th>
        <th>会社名</th>
        <th>担当者</th>
        <th>メールアドレス</th>
        <th>業種</th>
        <th>エリア</th>
        <th>送信状況</th>
        <th>返信有無</th>
        <th>現在ステータス</th>
        <th>商談日</th>
        <th>成約</th>
        <th>最終更新</th>
        <th>詳細</th>
        <th>AI要約</th>
        <th>AI操作</th>
      </tr>
    </thead>
    <tbody id="company-table-body"></tbody>
  </table>

  <div class="company-list__pagination" id="pagination" hidden></div>

  <div class="modal-overlay" id="draft-modal" hidden>
    <div class="modal">
      <button type="button" class="modal__close" id="draft-modal-close" aria-label="閉じる">×</button>
      <h2>営業メール・DM下書き</h2>
      <p id="draft-modal-error" class="error-message" hidden></p>
      <div id="draft-modal-body-wrapper" hidden>
        <label>件名</label>
        <input type="text" id="draft-modal-subject" readonly />
        <label>本文</label>
        <textarea id="draft-modal-content" rows="10" readonly></textarea>
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="history-modal" hidden>
    <div class="modal">
      <button type="button" class="modal__close" id="history-modal-close" aria-label="閉じる">×</button>
      <h2>メール履歴</h2>
      <p id="history-modal-error" class="error-message" hidden></p>
      <p id="history-modal-empty" class="empty-state" hidden>メール履歴がありません。</p>
      <div id="history-modal-list"></div>
    </div>
  </div>

  <div class="modal-overlay" id="status-change-modal" hidden>
    <div class="modal">
      <button type="button" class="modal__close" id="status-change-modal-close" aria-label="閉じる">×</button>
      <h2>ステータス変更</h2>
      <label>変更先ステータス</label>
      <select id="status-change-select">
        <option value="未送信">送信待ち</option>
        <option value="送信済">送信済</option>
        <option value="返信あり">返信あり</option>
        <option value="配信停止">配信停止</option>
      </select>
      <div class="company-list__bulk-actions">
        <button type="button" class="button button--secondary" id="status-change-cancel-button">キャンセル</button>
        <button type="button" class="button" id="status-change-update-button">更新</button>
      </div>
    </div>
  </div>
</div>

<!-- 一括送信タブ（Sprint8④-2）: まだ初回メールを送信していない企業のみ表示し、
     テンプレートを選択して一括送信する。既存のテンプレート管理画面（Sprint7⑤）のデータを
     listSalesTemplates()でそのまま参照し、新しいテンプレート管理UIは作らない。 -->
<div class="sales-tab-panel" id="send-tab-panel" hidden>
  <div class="company-list__selection">
    <span id="send-selection-count">選択中：0件</span>
    <div id="send-bulk-progress" class="company-list__bulk-progress" hidden>
      <span id="send-progress-label" class="company-list__bulk-progress-label"></span>
      <div class="progress-bar" id="send-progress-bar" role="progressbar" aria-label="送信の進捗" aria-valuemin="0" aria-valuemax="100">
        <div class="progress-bar__fill" id="send-progress-fill"></div>
      </div>
    </div>
  </div>

  <div class="sales-send__toolbar">
    <label for="send-template-select">送信テンプレート</label>
    <select id="send-template-select"></select>
    <button type="button" class="button" id="send-tab-send-button">選択した企業へ一括送信</button>
  </div>

  <p id="send-list-loading" class="empty-state">読み込み中…</p>
  <p id="send-list-empty" class="empty-state" hidden>未送信の企業はありません。</p>

  <table class="company-table" id="send-table" hidden>
    <thead>
      <tr>
        <th><input type="checkbox" id="send-select-all-checkbox" aria-label="全選択" /></th>
        <th>会社名</th>
        <th>担当者</th>
        <th>メールアドレス</th>
        <th>業種</th>
      </tr>
    </thead>
    <tbody id="send-table-body"></tbody>
  </table>
</div>

<!-- 返信確認タブ（Sprint8④-3）: 新着返信（初回）／継続返信の2サブタブ。 -->
<div class="sales-tab-panel" id="reply-tab-panel" hidden>
  <div class="sales-subtabs" id="reply-subtabs">
    <button type="button" class="sales-subtabs__tab is-active" data-reply-subtab="new">
      新着返信 <span class="sales-tabs__badge" id="new-reply-subtab-badge" hidden>0</span>
    </button>
    <button type="button" class="sales-subtabs__tab" data-reply-subtab="ongoing">継続返信</button>
  </div>

  <div class="sales-tab-panel" id="reply-new-panel">
    <p id="reply-new-loading" class="empty-state">読み込み中…</p>
    <p id="reply-new-empty" class="empty-state" hidden>新着の返信はありません。</p>
    <div id="reply-new-list" class="reply-new-list"></div>
  </div>

  <div class="sales-tab-panel" id="reply-ongoing-panel" hidden>
    <div class="reply-chat">
      <div class="reply-chat__list">
        <p id="reply-ongoing-loading" class="empty-state">読み込み中…</p>
        <p id="reply-ongoing-empty" class="empty-state" hidden>継続対応中の企業はありません。</p>
        <ul id="reply-ongoing-company-list" class="reply-chat__company-list"></ul>
      </div>
      <div class="reply-chat__thread" id="reply-chat-thread">
        <p class="empty-state">左の一覧から企業を選択してください。</p>
      </div>
    </div>
  </div>
</div>
</section>

<script>
  (function () {
    var PAGE_SIZE = 20;
    var allCompanies = [];
    var currentPage = 1;
    var statusQuickFilter = 'all';
    var selectedCompanyIds = {};
    // 検索フォーム（キーワード・業種・送信状況・送信可否）の現在の検索条件を保持する。
    // loadCompanies()呼び出し側はここを更新してから渡すことで、一覧の再読み込み時にも
    // 検索条件を維持できる（Sprint6 Step9）。
    var currentFilter = {
      keyword: '',
      industry: '',
      sendStatus: '',
      sendApproval: '',
    };
    // 一括AI分析の実行中かどうか。実行中はhandleAnalyzeClick()完了時にボタンを再有効化
    // しないようにするためのフラグ（Sprint6 Step10）。
    var isBulkAnalyzing = false;
    // 一括送信の実行中かどうか。実行中はhandleSendMailClick()完了時にボタンを再有効化
    // しないようにするためのフラグ（Sprint6 Step11）。
    var isBulkSending = false;
    // 一括ステータス変更の実行中かどうか（Sprint6 Step12）。
    var isBulkUpdatingStatus = false;
    // 直近の一括ステータス変更の取り消し（Undo）情報。5秒以内であれば変更前の状態へ戻せる
    // （永続保存はせずメモリ上のみで保持。Sprint6 Step13）。
    // 形: { companyIds: [...], previousStatuses: { companyId: 変更前ステータス }, timeoutId }
    var lastStatusChange = null;

    var loadingEl = document.getElementById('list-loading');
    var errorEl = document.getElementById('list-error');
    var emptyEl = document.getElementById('list-empty');
    var tableEl = document.getElementById('company-table');
    var tbody = document.getElementById('company-table-body');
    var paginationEl = document.getElementById('pagination');
    var selectAllCheckbox = document.getElementById('select-all-checkbox');
    var selectionCountEl = document.getElementById('selection-count');
    var bulkActionBarEl = document.getElementById('bulk-action-bar');
    var bulkAnalyzeProgressEl = document.getElementById('bulk-analyze-progress');
    var bulkProgressLabelEl = document.getElementById('bulk-progress-label');
    var bulkProgressFillEl = document.getElementById('bulk-progress-fill');
    var bulkProgressBarEl = document.getElementById('bulk-progress-bar');
    var companyListRootEl = document.getElementById('company-list-root');
    var statusUndoBarEl = document.getElementById('status-undo-bar');

    var draftModal = document.getElementById('draft-modal');
    var draftModalError = document.getElementById('draft-modal-error');
    var draftModalBodyWrapper = document.getElementById('draft-modal-body-wrapper');
    var draftModalSubject = document.getElementById('draft-modal-subject');
    var draftModalContent = document.getElementById('draft-modal-content');

    var historyModal = document.getElementById('history-modal');
    var historyModalError = document.getElementById('history-modal-error');
    var historyModalEmpty = document.getElementById('history-modal-empty');
    var historyModalList = document.getElementById('history-modal-list');

    var statusChangeModal = document.getElementById('status-change-modal');
    var statusChangeSelect = document.getElementById('status-change-select');

    function escapeHtml(value) {
      return String(value == null ? '' : value).replace(/[&<>"']/g, function (ch) {
        return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[ch];
      });
    }

    function populateIndustryOptions(companies) {
      var select = document.getElementById('filter-industry');
      var existing = Array.prototype.map.call(select.options, function (o) {
        return o.value;
      });
      var industries = [];
      companies.forEach(function (c) {
        if (c.industry && industries.indexOf(c.industry) === -1) {
          industries.push(c.industry);
        }
      });
      industries.forEach(function (industry) {
        if (existing.indexOf(industry) === -1) {
          var option = document.createElement('option');
          option.value = industry;
          option.textContent = industry;
          select.appendChild(option);
        }
      });
    }

    function findCompany(companyId) {
      return allCompanies.filter(function (c) {
        return c.companyId === companyId;
      })[0];
    }

    function getTodayDateString() {
      var d = new Date();
      var mm = String(d.getMonth() + 1).padStart(2, '0');
      var dd = String(d.getDate()).padStart(2, '0');
      return d.getFullYear() + '-' + mm + '-' + dd;
    }

    // 営業管理「営業リスト」タブ（Sprint8④-1）は、初回メール送信済みの企業のみを対象とする
    // （未送信の企業は「一括送信」タブの対象）。読み取り専用のクライアント側フィルタで、
    // サーバー側のlistCompaniesFromSheet_は変更しない。
    function applyTabBaseFilter(companies) {
      return companies.filter(function (c) {
        return c.sendStatus !== '未送信';
      });
    }

    // 営業リストタブの「現在ステータス」列（Sprint8④-1）。既存の送信状況・返信有無・商談日・
    // 成約の各フィールドから表示用ラベルを計算するだけで、新しい列・書き込み処理は追加しない。
    function computeCurrentStatusLabel(c) {
      if (c.dealResult === '成約') {
        return '成約';
      }
      if (c.dealResult === '失注') {
        return '失注';
      }
      if (c.sendStatus === '保留') {
        return '保留';
      }
      if (c.meetingDate) {
        return '商談中';
      }
      if (c.hasReply === '返信あり' && c.sendStatus === '対応中') {
        return '対応中';
      }
      if (c.hasReply === '返信あり') {
        return '要対応';
      }
      if (c.sendStatus === '送信済') {
        return '返信待ち';
      }
      return c.sendStatus || '—';
    }

    // 既存のキーワード・業種・送信状況・送信可否の絞り込み結果（allCompanies）に対して、
    // クライアント側でさらにステータスの簡易フィルタを重ねる（読み取り専用・サーバー側の
    // listCompaniesFromSheet_は変更しない）。
    function applyStatusQuickFilter(companies) {
      if (statusQuickFilter === 'all') {
        return companies;
      }

      var today = getTodayDateString();

      return companies.filter(function (c) {
        switch (statusQuickFilter) {
          case 'pendingSend':
            return c.sendApproval === '○' && c.sendStatus !== '送信済';
          case 'replied':
            return c.hasReply === '返信あり';
          case 'inNegotiation':
            return !!c.meetingDate && !c.dealResult;
          case 'todayMeeting':
            return !!c.meetingDate && String(c.meetingDate).indexOf(today) === 0;
          case 'won':
            return c.dealResult === '成約';
          default:
            return true;
        }
      });
    }

    // 選択件数表示・一括操作バーの表示/非表示を選択状態に合わせて更新する（画面表示のみ、
    // 会社データは変更しない）。
    function updateSelectionUI() {
      var count = Object.keys(selectedCompanyIds).length;
      selectionCountEl.textContent = '選択中：' + count + '件';
      bulkActionBarEl.hidden = count === 0;
    }

    // 表示中ページの行チェックボックスがすべて選択済みかどうかをヘッダーの全選択
    // チェックボックスへ反映する。
    function updateSelectAllCheckboxState() {
      var checkboxes = tbody.querySelectorAll('.row-select-checkbox');
      selectAllCheckbox.checked =
        checkboxes.length > 0 && Array.prototype.every.call(checkboxes, function (cb) {
          return cb.checked;
        });
    }

    function renderPage() {
      // ページ・絞り込みが変わるたびに選択状態はリセットする（表示中ページのみを選択対象と
      // するため）。
      selectedCompanyIds = {};
      selectAllCheckbox.checked = false;
      updateSelectionUI();

      var filteredCompanies = applyStatusQuickFilter(applyTabBaseFilter(allCompanies));

      if (filteredCompanies.length === 0) {
        tableEl.hidden = true;
        paginationEl.hidden = true;
        emptyEl.hidden = false;
        return;
      }
      emptyEl.hidden = true;
      tableEl.hidden = false;

      var totalPages = Math.max(1, Math.ceil(filteredCompanies.length / PAGE_SIZE));
      currentPage = Math.min(currentPage, totalPages);
      var start = (currentPage - 1) * PAGE_SIZE;
      var pageItems = filteredCompanies.slice(start, start + PAGE_SIZE);

      tbody.innerHTML = pageItems
        .map(function (c) {
          return (
            '<tr data-company-id="' + escapeHtml(c.companyId) + '">' +
            '<td><input type="checkbox" class="row-select-checkbox" data-company-id="' + escapeHtml(c.companyId) + '" aria-label="選択" /></td>' +
            '<td>' + escapeHtml(c.companyName) + '</td>' +
            '<td>' + escapeHtml(c.ownerName) + '</td>' +
            '<td>' + escapeHtml(c.email) + '</td>' +
            '<td>' + escapeHtml(c.industry) + '</td>' +
            '<td>' + escapeHtml(c.area) + '</td>' +
            '<td>' + escapeHtml(c.sendStatus) + '</td>' +
            '<td>' + escapeHtml(c.hasReply) + '</td>' +
            '<td>' + escapeHtml(computeCurrentStatusLabel(c)) + '</td>' +
            '<td>' + escapeHtml(c.meetingDate) + '</td>' +
            '<td>' + escapeHtml(c.dealResult) + '</td>' +
            '<td>' + escapeHtml(c.updatedAt) + '</td>' +
            '<td title="企業詳細はSprint3で実装予定">-</td>' +
            '<td class="ai-summary-cell" title="' + escapeHtml(c.aiSummary) + '">' + escapeHtml(c.aiSummary || '未解析') + '</td>' +
            '<td class="company-table__ai-actions">' +
            '<button type="button" class="button button--secondary" data-action="analyze">AI分析</button>' +
            '<button type="button" class="button button--secondary" data-action="history">履歴</button>' +
            '<button type="button" class="button button--secondary" data-action="draft">営業メール生成</button>' +
            '<button type="button" class="button button--secondary" data-action="gmail-draft">Gmail下書き作成</button>' +
            '<button type="button" class="button button--secondary" data-action="send-mail">送信</button>' +
            '</td>' +
            '</tr>'
          );
        })
        .join('');

      paginationEl.hidden = totalPages <= 1;
      paginationEl.innerHTML = '';
      for (var i = 1; i <= totalPages; i++) {
        var button = document.createElement('button');
        button.type = 'button';
        button.className = 'button button--secondary' + (i === currentPage ? ' is-active' : '');
        button.textContent = String(i);
        (function (page) {
          button.addEventListener('click', function () {
            currentPage = page;
            renderPage();
          });
        })(i);
        paginationEl.appendChild(button);
      }
    }

    function loadCompanies(filter) {
      loadingEl.hidden = false;
      errorEl.hidden = true;
      emptyEl.hidden = true;
      tableEl.hidden = true;
      paginationEl.hidden = true;

      google.script.run
        .withSuccessHandler(function (companies) {
          loadingEl.hidden = true;
          allCompanies = companies || [];
          currentPage = 1;
          populateIndustryOptions(allCompanies);
          if (allCompanies.length === 0) {
            emptyEl.hidden = false;
            return;
          }
          tableEl.hidden = false;
          renderPage();
        })
        .withFailureHandler(function (error) {
          loadingEl.hidden = true;
          errorEl.hidden = false;
          errorEl.textContent = error && error.message ? error.message : String(error);
        })
        .listCompanies(filter || {});
    }

    selectAllCheckbox.addEventListener('change', function () {
      var checkboxes = tbody.querySelectorAll('.row-select-checkbox');
      var checked = selectAllCheckbox.checked;

      Array.prototype.forEach.call(checkboxes, function (cb) {
        cb.checked = checked;
        var companyId = cb.getAttribute('data-company-id');
        if (checked) {
          selectedCompanyIds[companyId] = true;
        } else {
          delete selectedCompanyIds[companyId];
        }
      });

      updateSelectionUI();
    });

    tbody.addEventListener('change', function (event) {
      var checkbox = event.target.closest('.row-select-checkbox');
      if (!checkbox) {
        return;
      }

      var companyId = checkbox.getAttribute('data-company-id');
      if (checkbox.checked) {
        selectedCompanyIds[companyId] = true;
      } else {
        delete selectedCompanyIds[companyId];
      }

      updateSelectAllCheckboxState();
      updateSelectionUI();
    });

    bulkActionBarEl.addEventListener('click', function (event) {
      var button = event.target.closest('[data-bulk-action]');
      if (!button) {
        return;
      }

      var action = button.getAttribute('data-bulk-action');
      if (action === 'analyze') {
        handleBulkAnalyzeClick();
        return;
      }
      if (action === 'send') {
        handleBulkSendClick();
        return;
      }
      if (action === 'status') {
        openStatusChangeModal();
        return;
      }

      showToast('Sprint7以降で実装予定', 'info');
    });

    // statusQuickFilterを切り替え、ステータスフィルタボタンのis-active表示も合わせて更新する
    // （クリック操作・URLパラメータからの初期表示の両方から共通で呼び出す。Sprint6 Step14）。
    function applyStatusQuickFilterSelection(key) {
      statusQuickFilter = key;
      Array.prototype.forEach.call(document.querySelectorAll('#status-filter [data-status-filter]'), function (b) {
        b.classList.toggle('is-active', b.getAttribute('data-status-filter') === key);
      });
    }

    function handleAnalyzeClick(button, companyId, onDone) {
      var originalText = button.textContent;
      button.disabled = true;
      button.classList.add('button--loading');
      button.textContent = '解析中…';

      google.script.run
        .withSuccessHandler(function (result) {
          // 一括AI分析の実行中は、完了までボタンを再有効化しない（Sprint6 Step10）。

          if (company) {
            company.aiSummary = result.summary || '';

                summaryCell.textContent = '解析失敗: ' + (result.errorMessage || '不明なエラー');

    // 一括AI分析（Sprint6 Step8）。Step7で選択された企業のみを対象に、既存の単体AI分析処理
    // （handleAnalyzeClick）を1件ずつ順番に呼び出す。AI分析ロジック自体は変更しない。
    //
    // 一括AI分析中は画面全体をロックする（Sprint6 Step10）。button要素はdisabledで、
    // チェックボックス・検索フォームの入力欄もdisabledで操作不可にし、さらにセクション全体へ
    // pointer-events:noneを付与することで、disabledが効かない要素（<a>リンク等）を含めて
    // クリック等の操作を一切受け付けないようにする。
    function setPageBusy(disabled) {
      Array.prototype.forEach.call(document.querySelectorAll('button'), function (btn) {
        btn.disabled = disabled;
      });

      document.getElementById('filter-keyword').disabled = disabled;
      document.getElementById('filter-industry').disabled = disabled;
      document.getElementById('filter-send-status').disabled = disabled;
      document.getElementById('filter-send-approval').disabled = disabled;

      selectAllCheckbox.disabled = disabled;
      Array.prototype.forEach.call(tbody.querySelectorAll('.row-select-checkbox'), function (cb) {
        cb.disabled = disabled;

      companyListRootEl.classList.toggle('is-locked', disabled);

    // 一括処理（AI分析・送信・ステータス変更共通）の進捗表示。labelには「AI分析中」「送信中」等を
    // 渡す（Sprint6 Step8で新設、Step11で送信と共用化。Sprint6④でテキストのみの表示から
    // プログレスバーへ変更）。
    function showBulkProgress(label, current, total) {
      bulkAnalyzeProgressEl.hidden = false;
      bulkProgressLabelEl.textContent = label + '... ' + current + ' / ' + total;
      var percent = total > 0 ? Math.round((current / total) * 100) : 0;
      bulkProgressFillEl.style.width = percent + '%';
      bulkProgressBarEl.setAttribute('aria-valuenow', String(percent));
    }

    function hideBulkProgress() {
      bulkAnalyzeProgressEl.hidden = true;
      bulkProgressLabelEl.textContent = '';
      bulkProgressFillEl.style.width = '0%';
      bulkProgressBarEl.removeAttribute('aria-valuenow');
    }

    // 一括処理（AI分析・送信共通）の実行ランナー。選択された企業を1件ずつ、options.handler
    // （handleAnalyzeClick または handleSendMailClick）で順番に処理し、成功/失敗件数を集計する。
    // 1件失敗しても中断せず最後まで続行する（Sprint6 Step8で新設、Step11で送信と共用化）。
    function runBulkStep(companyIds, index, successCount, failureCount, onComplete, options) {
      if (index >= companyIds.length) {
        onComplete(successCount, failureCount);
        return;
      }

      showBulkProgress(options.progressLabel, index + 1, companyIds.length);

      var companyId = companyIds[index];
      var row = tbody.querySelector('tr[data-company-id="' + companyId + '"]');
      var button = row ? row.querySelector(options.buttonSelector) : null;

      if (!button) {
        runBulkStep(companyIds, index + 1, successCount, failureCount + 1, onComplete, options);
        return;
      }

      options.handler(button, companyId, function (success) {
        // isBulkAnalyzing/isBulkSending中はhandleAnalyzeClick()/handleSendMailClick()が
        // ボタンを再有効化しないため、ここで再度disabledにする処理は不要（Sprint6 Step10）。
        if (success) {
          runBulkStep(companyIds, index + 1, successCount + 1, failureCount, onComplete, options);
        } else {
          runBulkStep(companyIds, index + 1, successCount, failureCount + 1, onComplete, options);
        }
      });
    }

    function handleBulkAnalyzeClick() {

      var confirmed = window.confirm(companyIds.length + '件の企業をAI分析します。\nよろしいですか？');
      if (!confirmed) {

      isBulkAnalyzing = true;
      setPageBusy(true);

      runBulkStep(
        companyIds,

          setPageBusy(false);
          showToast('AI分析が完了しました。\n\n成功 ' + successCount + '件\n失敗 ' + failureCount + '件', failureCount > 0 ? 'error' : 'success');
          // 検索条件（keyword/industry/sendStatus/sendApproval）を維持したまま再読み込みする
          // （statusQuickFilterはrenderPage()が毎回参照するため、ここで渡す必要はない。Sprint6 Step9）。
          loadCompanies(currentFilter);

        { progressLabel: 'AI分析中', buttonSelector: '[data-action="analyze"]', handler: handleAnalyzeClick }
      );

    // 一括ステータス変更（Sprint6 Step12）。Step7で選択された企業のみを対象に、上記の
    // 単体ステータス変更処理を、既存のrunBulkStep()で1件ずつ順番に呼び出す（ランナー・
    // 進捗表示・画面ロックはStep8/11と共通のものをそのまま再利用し、新設しない）。
    //
    // 実行前に対象企業の変更前ステータスをメモリ上へ保持し、完了後は成功/失敗のalertの
    // 代わりに「元に戻す」通知バーを5秒間表示する（Sprint6 Step13）。
    function handleBulkStatusUpdateClick(status) {
      var companyIds = Object.keys(selectedCompanyIds);
      if (companyIds.length === 0) {
        return;
      }

      var previousStatuses = {};
      companyIds.forEach(function (companyId) {
        var company = findCompany(companyId);
        previousStatuses[companyId] = company ? company.sendStatus : '';
      });

      isBulkUpdatingStatus = true;
      setPageBusy(true);

      runBulkStep(
        companyIds,
        0,
        0,
        0,
        function () {
          isBulkUpdatingStatus = false;
          hideBulkProgress();
          setPageBusy(false);
          showStatusUndoBar(companyIds, previousStatuses);
          // 検索条件・statusQuickFilterを維持したまま再読み込みする（Sprint6 Step9と同様）。
          loadCompanies(currentFilter);
        },
        {
          progressLabel: '更新中',
          buttonSelector: '[data-action="analyze"]',
          handler: function (button, companyId, onDone) {
            handleUpdateStatusClick(button, companyId, status, onDone);
          },
        }
      );
    }

    // 一括ステータス変更のUndo通知バーを5秒間表示する（Sprint6 Step13）。5秒経過したら
    // Undo情報を破棄し、以後「元に戻す」を押しても何も起きなくなる。
    function showStatusUndoBar(companyIds, previousStatuses) {
      if (lastStatusChange && lastStatusChange.timeoutId) {
        clearTimeout(lastStatusChange.timeoutId);
      }

      lastStatusChange = { companyIds: companyIds, previousStatuses: previousStatuses };
      statusUndoBarEl.hidden = false;
      lastStatusChange.timeoutId = setTimeout(function () {
        hideStatusUndoBar();
      }, 5000);
    }

    function hideStatusUndoBar() {
      if (lastStatusChange && lastStatusChange.timeoutId) {
        clearTimeout(lastStatusChange.timeoutId);
      }
      lastStatusChange = null;
      statusUndoBarEl.hidden = true;
    }

    // Undo実行（Sprint6 Step13）。保持しておいた変更前ステータスへ、既存のhandleUpdateStatusClick
    // （updateCompanyStatus()を呼ぶ単体ステータス変更処理）を、既存のrunBulkStep()で1件ずつ
    // 順番に呼び戻す。新しいService・Router・ランナーは追加しない。
    function handleStatusUndoClick() {
      if (!lastStatusChange) {
        return;
      }

      var change = lastStatusChange;
      hideStatusUndoBar();

      isBulkUpdatingStatus = true;
      setPageBusy(true);

      runBulkStep(
        change.companyIds,
        0,
        0,
        0,
        function () {
          isBulkUpdatingStatus = false;
          hideBulkProgress();
          setPageBusy(false);
          loadCompanies(currentFilter);

        {
          progressLabel: '元に戻しています',
          buttonSelector: '[data-action="analyze"]',
          handler: function (button, companyId, onDone) {
            handleUpdateStatusClick(button, companyId, change.previousStatuses[companyId], onDone);
          },
        }
      );
    }

    function renderHistoryList(threads) {
      historyModalList.innerHTML = threads
        .map(function (thread) {
          var messagesHtml = thread.messages
            .map(function (message, index) {
              return (
                (index > 0 ? '<hr class="mail-history-message-divider" />' : '') +
                '<p class="mail-history-direction"><strong>' + escapeHtml(message.direction) + '</strong></p>' +
                '<p class="mail-history-date">' + escapeHtml(message.date) + '</p>' +
                '<div class="mail-history-body">' + escapeHtml(message.body) + '</div>'
              );
            })
            .join('');

          return (
            '<div class="mail-history-thread">' +
            '<p class="mail-history-subject"><strong>件名:</strong> ' + escapeHtml(thread.subject) + '</p>' +
            messagesHtml +
            '</div>'
          );
        })
        .join('');
    }

          '送信後は取り消せません。\n\n' +
          '送信しますか？\n' +
          '━━━━━━━━━━━━━━━━━━'
        );

        if (!confirmed) {
          return;
        }

        handleSendMailClick(sendMailBtn, companyId);
      }
    });

    document.getElementById('draft-modal-close').addEventListener('click', closeDraftModal);
    draftModal.addEventListener('click', function (event) {
      if (event.target === draftModal) {
        closeDraftModal();
      }
    });

    document.getElementById('history-modal-close').addEventListener('click', closeHistoryModal);
    historyModal.addEventListener('click', function (event) {
      if (event.target === historyModal) {
        closeHistoryModal();
      }
    });

    document.getElementById('status-change-modal-close').addEventListener('click', closeStatusChangeModal);
    document.getElementById('status-change-cancel-button').addEventListener('click', closeStatusChangeModal);
    statusChangeModal.addEventListener('click', function (event) {
      if (event.target === statusChangeModal) {
        closeStatusChangeModal();
      }

    document.getElementById('status-change-update-button').addEventListener('click', function () {
      var status = statusChangeSelect.value;
      closeStatusChangeModal();
      handleBulkStatusUpdateClick(status);
    });

    document.getElementById('status-undo-button').addEventListener('click', handleStatusUndoClick);

    // ダッシュボードのフォローアップ一覧から遷移した場合（?page=companyList&keyword=会社名）、
    // その会社名で絞り込んだ状態で表示する。keywordが無い場合は従来どおり全件表示する。
    var initialKeyword = '';
    try {
      initialKeyword = new URLSearchParams(window.location.search).get('keyword') || '';
    } catch (e) {
      initialKeyword = '';
    }
    if (initialKeyword) {
      document.getElementById('filter-keyword').value = initialKeyword;
    }
    currentFilter = {
      keyword: initialKeyword,
      industry: '',
      sendStatus: '',
      sendApproval: '',
    };

    // Dashboardの集計カードから遷移した場合（?page=companyList&statusQuickFilter=xxx）、
    // 対応するステータスクイックフィルタを適用した状態で表示する。keywordパラメータとも
    // 併用可能（両方指定されていれば両方適用される）。初期表示時に読み取るのみで、
    // それ以外の挙動（検索・ページング・一括操作・currentFilter等）には影響しない
    // （Sprint6 Step14）。
    var initialStatusQuickFilter = '';
    try {
      initialStatusQuickFilter = new URLSearchParams(window.location.search).get('statusQuickFilter') || '';
    } catch (e) {
      initialStatusQuickFilter = '';
    }
    var VALID_STATUS_QUICK_FILTERS = ['all', 'pendingSend', 'replied', 'inNegotiation', 'todayMeeting', 'won'];
    if (initialStatusQuickFilter && VALID_STATUS_QUICK_FILTERS.indexOf(initialStatusQuickFilter) !== -1) {
      applyStatusQuickFilterSelection(initialStatusQuickFilter);
    }

    loadCompanies(currentFilter);

    // ============================================================
    // Sprint8④ 営業管理タブ（営業リスト／一括送信／返信確認）
    // 営業リストタブは既存のCompanyList実装をそのまま使う（上記コード）。
    // 以下は新設した一括送信・返信確認タブの実装。既存のRouter関数
    // （listCompanies/listSalesTemplates/analyzeCompanyInfo/generateSalesDraft/
    // sendSalesMail/listInboxMessages/updateCompanyStatus/generateReplyDraft/
    // listCompanyMailHistory/replyInboxMessage）をそのまま呼び出すだけで、
    // 新しいSheets書き込みロジックは追加しない（summarizeReplyのみSprint8で新設）。
    // ============================================================

    var salesTabsEl = document.getElementById('sales-tabs');
    var listTabPanel = document.getElementById('company-list-root');
    var sendTabPanel = document.getElementById('send-tab-panel');
    var replyTabPanel = document.getElementById('reply-tab-panel');
    var sendTabLoaded = false;
    var replyTabLoaded = false;

    function setActiveSalesTab(tabKey) {
      Array.prototype.forEach.call(salesTabsEl.querySelectorAll('[data-sales-tab]'), function (btn) {
        btn.classList.toggle('is-active', btn.getAttribute('data-sales-tab') === tabKey);
      });
      listTabPanel.hidden = tabKey !== 'list';
      sendTabPanel.hidden = tabKey !== 'send';
      replyTabPanel.hidden = tabKey !== 'reply';

      if (tabKey === 'send' && !sendTabLoaded) {
        sendTabLoaded = true;
        loadSendTab();
      }
      if (tabKey === 'reply' && !replyTabLoaded) {
        replyTabLoaded = true;
        loadReplyTab();
      }
    }

    salesTabsEl.addEventListener('click', function (event) {
      var btn = event.target.closest('[data-sales-tab]');
      if (!btn) {
        return;
      }
      setActiveSalesTab(btn.getAttribute('data-sales-tab'));
    });

    // --- 一括送信タブ（Sprint8④-2） ---

    var sendCompanies = [];
    var selectedSendCompanyIds = {};
    var sendLoadingEl = document.getElementById('send-list-loading');
    var sendEmptyEl = document.getElementById('send-list-empty');
    var sendTableEl = document.getElementById('send-table');
    var sendTbody = document.getElementById('send-table-body');
    var sendSelectAllCheckbox = document.getElementById('send-select-all-checkbox');
    var sendSelectionCountEl = document.getElementById('send-selection-count');
    var sendTemplateSelect = document.getElementById('send-template-select');
    var sendTabSendButton = document.getElementById('send-tab-send-button');
    var sendBulkProgressEl = document.getElementById('send-bulk-progress');
    var sendProgressLabelEl = document.getElementById('send-progress-label');
    var sendProgressBarEl = document.getElementById('send-progress-bar');
    var sendProgressFillEl = document.getElementById('send-progress-fill');

    function updateSendSelectionUI() {
      sendSelectionCountEl.textContent = '選択中：' + Object.keys(selectedSendCompanyIds).length + '件';
    }

    function renderSendTable() {
      var badge = document.getElementById('send-tab-badge');
      if (sendCompanies.length === 0) {
        sendTableEl.hidden = true;
        sendEmptyEl.hidden = false;
        badge.hidden = true;
        return;
      }
      sendEmptyEl.hidden = true;
      sendTableEl.hidden = false;
      badge.hidden = false;
      badge.textContent = String(sendCompanies.length);

      sendTbody.innerHTML = sendCompanies
        .map(function (c) {
          return (
            '<tr data-company-id="' + escapeHtml(c.companyId) + '">' +
            '<td><input type="checkbox" class="send-row-checkbox" data-company-id="' + escapeHtml(c.companyId) + '" aria-label="選択" /></td>' +
            '<td>' + escapeHtml(c.companyName) + '</td>' +
            '<td>' + escapeHtml(c.ownerName) + '</td>' +
            '<td>' + escapeHtml(c.email) + '</td>' +
            '<td>' + escapeHtml(c.industry) + '</td>' +
            '</tr>'
          );
        })
        .join('');
    }

    function loadSendTab() {
      sendLoadingEl.hidden = false;
      sendTableEl.hidden = true;
      selectedSendCompanyIds = {};
      updateSendSelectionUI();

      google.script.run
        .withSuccessHandler(function (companies) {
          sendLoadingEl.hidden = true;
          sendCompanies = (companies || []).filter(function (c) {
            return c.sendApproval === '○' && c.sendStatus === '未送信';
          });
          renderSendTable();
        })
        .withFailureHandler(function (error) {
          sendLoadingEl.hidden = true;
          showToast('一括送信対象の取得に失敗しました: ' + (error && error.message ? error.message : String(error)), 'error');
        })
        .listCompanies({});

      google.script.run
        .withSuccessHandler(function (templates) {
          templates = templates || [];
          sendTemplateSelect.innerHTML = templates
            .map(function (t) {
              return '<option value="' + escapeHtml(t.templateId) + '">' + escapeHtml(t.displayName) + (t.isDefault ? '（デフォルト）' : '') + '</option>';
            })
            .join('');
          var defaultTemplate = templates.filter(function (t) {
            return t.isDefault;
          })[0];
          if (defaultTemplate) {
            sendTemplateSelect.value = defaultTemplate.templateId;
          }
        })
        .withFailureHandler(function (error) {
          showToast('テンプレート一覧の取得に失敗しました: ' + (error && error.message ? error.message : String(error)), 'error');
        })
        .listSalesTemplates();
    }

    sendSelectAllCheckbox.addEventListener('change', function () {
      var checked = sendSelectAllCheckbox.checked;
      Array.prototype.forEach.call(sendTbody.querySelectorAll('.send-row-checkbox'), function (cb) {
        cb.checked = checked;
        var id = cb.getAttribute('data-company-id');
        if (checked) {
          selectedSendCompanyIds[id] = true;
        } else {
          delete selectedSendCompanyIds[id];
        }
      });
      updateSendSelectionUI();
    });

    sendTbody.addEventListener('change', function (event) {
      var cb = event.target.closest('.send-row-checkbox');
      if (!cb) {
        return;
      }
      var id = cb.getAttribute('data-company-id');
      if (cb.checked) {
        selectedSendCompanyIds[id] = true;
      } else {
        delete selectedSendCompanyIds[id];
      }
      updateSendSelectionUI();
    });

    function showSendProgress(label, current, total) {
      sendBulkProgressEl.hidden = false;
      sendProgressLabelEl.textContent = label + '... ' + current + ' / ' + total;
      var percent = total > 0 ? Math.round((current / total) * 100) : 0;
      sendProgressFillEl.style.width = percent + '%';
      sendProgressBarEl.setAttribute('aria-valuenow', String(percent));
    }

    function hideSendProgress() {
      sendBulkProgressEl.hidden = true;
      sendProgressLabelEl.textContent = '';
      sendProgressFillEl.style.width = '0%';
      sendProgressBarEl.removeAttribute('aria-valuenow');
    }

    // 選択企業を1件ずつ、既存のAI分析→営業メール生成（選択テンプレート指定）→送信の順で
    // 呼び出す（いずれも既存Router関数。一括送信専用の新しいSheets書き込みは追加しない）。
    function runSendTabBatch(companyIds, templateId, index, successCount, failureCount, onComplete) {
      if (index >= companyIds.length) {
        onComplete(successCount, failureCount);
        return;
      }
      var companyId = companyIds[index];
      showSendProgress('送信中', index + 1, companyIds.length);

      function next(success) {
        runSendTabBatch(companyIds, templateId, index + 1, successCount + (success ? 1 : 0), failureCount + (success ? 0 : 1), onComplete);
      }

      function proceedToDraft() {
        google.script.run
          .withSuccessHandler(function (draftResult) {
            if (!draftResult || draftResult.draftStatus !== '成功') {
              next(false);
              return;
            }
            google.script.run
              .withSuccessHandler(function () {
                next(true);
              })
              .withFailureHandler(function () {
                next(false);
              })
              .sendSalesMail(companyId);
          })
          .withFailureHandler(function () {
            next(false);
          })
          .generateSalesDraft(companyId, null, templateId);
      }

      google.script.run.withSuccessHandler(proceedToDraft).withFailureHandler(proceedToDraft).analyzeCompanyInfo(companyId);
    }

    sendTabSendButton.addEventListener('click', function () {
      var companyIds = Object.keys(selectedSendCompanyIds);
      if (companyIds.length === 0) {
        showToast('送信する企業を選択してください。', 'info');
        return;
      }
      var templateId = sendTemplateSelect.value;
      if (!templateId) {
        showToast('送信テンプレートを選択してください。', 'info');
        return;
      }
      var confirmed = window.confirm(
        '━━━━━━━━━━━━━━━━━━\n' +
        companyIds.length + '件の企業へ営業メールを送信します。\n\n' +
        '送信後は取り消せません。\n\n' +
        '送信しますか？\n' +
        '━━━━━━━━━━━━━━━━━━'
      );
      if (!confirmed) {
        return;
      }

      sendTabSendButton.disabled = true;
      sendTabSendButton.classList.add('button--loading');

      runSendTabBatch(companyIds, templateId, 0, 0, 0, function (successCount, failureCount) {
        sendTabSendButton.disabled = false;
        sendTabSendButton.classList.remove('button--loading');
        hideSendProgress();
        showToast('送信完了\n\n成功 ' + successCount + '件\n失敗 ' + failureCount + '件', failureCount > 0 ? 'error' : 'success');
        selectedSendCompanyIds = {};
        sendSelectAllCheckbox.checked = false;
        updateSendSelectionUI();
        // 送信成功した企業はsendStatusが更新され、一括送信タブの対象からは外れ、
        // 営業リストタブ（初回送信済み企業のみ表示）に自動的に現れるようになる（Sprint8④-2）。
        loadSendTab();
        loadCompanies(currentFilter);
      });
    });

    // --- 返信確認タブ（Sprint8④-3） ---

    var replySubtabsEl = document.getElementById('reply-subtabs');
    var replyNewPanel = document.getElementById('reply-new-panel');
    var replyOngoingPanel = document.getElementById('reply-ongoing-panel');
    var replyOngoingLoaded = false;

    function setActiveReplySubtab(key) {
      Array.prototype.forEach.call(replySubtabsEl.querySelectorAll('[data-reply-subtab]'), function (btn) {
        btn.classList.toggle('is-active', btn.getAttribute('data-reply-subtab') === key);
      });
      replyNewPanel.hidden = key !== 'new';
      replyOngoingPanel.hidden = key !== 'ongoing';
      if (key === 'ongoing' && !replyOngoingLoaded) {
        replyOngoingLoaded = true;
        loadOngoingReplyTab();
      }
    }

    replySubtabsEl.addEventListener('click', function (event) {
      var btn = event.target.closest('[data-reply-subtab]');
      if (!btn) {
        return;
      }
      setActiveReplySubtab(btn.getAttribute('data-reply-subtab'));
    });

    function loadReplyTab() {
      loadNewReplyTab();
    }

    function extractEmailFromFrom(from) {
      var match = String(from || '').match(/<([^<>]+)>/);
      return (match ? match[1] : from || '').trim().toLowerCase();
    }

    // listCompanies()とlistInboxMessages()（いずれも既存Router関数）を並行に呼び、
    // 両方そろってから処理する（新しい集計用Router関数は追加しない）。
    function parallelLoadCompaniesAndInbox(onSuccess, onFailure) {
      var companies = null;
      var inboxMessages = null;
      var failed = false;

      function checkDone() {
        if (!failed && companies !== null && inboxMessages !== null) {
          onSuccess(companies, inboxMessages);
        }
      }

      google.script.run
        .withSuccessHandler(function (result) {
          companies = result || [];
          checkDone();
        })
        .withFailureHandler(function (error) {
          failed = true;
          onFailure(error);
        })
        .listCompanies({});

      google.script.run
        .withSuccessHandler(function (result) {
          inboxMessages = result || [];
          checkDone();
        })
        .withFailureHandler(function (error) {
          failed = true;
          onFailure(error);
        })
        .listInboxMessages();
    }

    // --- 新着返信（初回） ---
    var newReplyCompanies = [];
    var newReplyLoadingEl = document.getElementById('reply-new-loading');
    var newReplyEmptyEl = document.getElementById('reply-new-empty');
    var newReplyListEl = document.getElementById('reply-new-list');

    function loadNewReplyTab() {
      newReplyLoadingEl.hidden = false;
      newReplyEmptyEl.hidden = true;
      newReplyListEl.innerHTML = '';

      parallelLoadCompaniesAndInbox(
        function (companies, inboxMessages) {
          newReplyLoadingEl.hidden = true;
          var emailToMessage = {};
          inboxMessages.forEach(function (m) {
            emailToMessage[extractEmailFromFrom(m.from)] = m;
          });

          // 新着返信（初回）＝返信ありかつ「対応中」（対応済みにする、を押していない）かつ
          // 商談・成約もまだ発生していない企業（FollowUpService.jsの「未対応」判定と同じ考え方）。
          newReplyCompanies = companies
            .filter(function (c) {
              return c.hasReply === '返信あり' && c.sendStatus !== '対応中' && !c.dealResult;
            })
            .map(function (c) {
              var message = emailToMessage[String(c.email || '').trim().toLowerCase()];
              return Object.assign({}, c, {
                threadId: message ? message.threadId : null,
                snippet: message ? message.snippet : '',
              });
            });

          var subtabBadge = document.getElementById('new-reply-subtab-badge');
          var tabBadge = document.getElementById('reply-tab-badge');
          if (newReplyCompanies.length > 0) {
            subtabBadge.hidden = false;
            subtabBadge.textContent = String(newReplyCompanies.length);
            tabBadge.hidden = false;
            tabBadge.textContent = String(newReplyCompanies.length);
          } else {
            subtabBadge.hidden = true;
            tabBadge.hidden = true;
          }

          if (newReplyCompanies.length === 0) {
            newReplyEmptyEl.hidden = false;
            return;
          }
          renderNewReplyList();
        },
        function (error) {
          newReplyLoadingEl.hidden = true;
          showToast('新着返信の取得に失敗しました: ' + (error && error.message ? error.message : String(error)), 'error');
        }
      );
    }

    function findNewReplyCompany(companyId) {
      return newReplyCompanies.filter(function (c) {
        return c.companyId === companyId;
      })[0];
    }

    function renderNewReplyList() {
      newReplyListEl.innerHTML = newReplyCompanies
        .map(function (c) {
          return (
            '<div class="reply-card" data-company-id="' + escapeHtml(c.companyId) + '">' +
            '<div class="reply-card__header">' +
            '<span class="reply-card__company">' + escapeHtml(c.companyName) + '</span>' +
            '<span class="reply-card__owner">' + escapeHtml(c.ownerName) + '</span>' +
            '</div>' +
            '<p class="reply-card__snippet">' + escapeHtml(c.snippet || '(本文プレビューなし)') + '</p>' +
            '<div class="reply-card__ai" id="reply-ai-' + escapeHtml(c.companyId) + '" hidden></div>' +
            '<div class="reply-card__actions">' +
            '<button type="button" class="button button--secondary" data-action="ai-summary">AI要約を見る</button>' +
            '<button type="button" class="button button--secondary" data-action="ai-suggest">AIがおすすめする返信内容</button>' +
            '<button type="button" class="button" data-action="resolve">対応済みにする</button>' +
            '</div>' +
            '</div>'
          );
        })
        .join('');
    }

    newReplyListEl.addEventListener('click', function (event) {
      var card = event.target.closest('.reply-card[data-company-id]');
      if (!card) {
        return;
      }
      var companyId = card.getAttribute('data-company-id');
      var company = findNewReplyCompany(companyId);
      if (!company) {
        return;
      }
      var aiBox = document.getElementById('reply-ai-' + companyId);

      var summaryBtn = event.target.closest('[data-action="ai-summary"]');
      if (summaryBtn) {
        if (!company.threadId) {
          showToast('対象の受信メールが見つかりませんでした。', 'info');
          return;
        }
        summaryBtn.disabled = true;
        summaryBtn.classList.add('button--loading');
        google.script.run
          .withSuccessHandler(function (summary) {
            summaryBtn.disabled = false;
            summaryBtn.classList.remove('button--loading');
            aiBox.hidden = false;
            aiBox.textContent = 'AI要約: ' + summary;
          })
          .withFailureHandler(function (error) {
            summaryBtn.disabled = false;
            summaryBtn.classList.remove('button--loading');
            showToast('AI要約に失敗しました: ' + (error && error.message ? error.message : String(error)), 'error');
          })
          .summarizeReply(company.threadId);
        return;
      }

      var suggestBtn = event.target.closest('[data-action="ai-suggest"]');
      if (suggestBtn) {
        if (!company.threadId) {
          showToast('対象の受信メールが見つかりませんでした。', 'info');
          return;
        }
        suggestBtn.disabled = true;
        suggestBtn.classList.add('button--loading');
        google.script.run
          .withSuccessHandler(function (draft) {
            suggestBtn.disabled = false;
            suggestBtn.classList.remove('button--loading');
            aiBox.hidden = false;
            aiBox.textContent = 'AIがおすすめする返信内容: ' + draft;
          })
          .withFailureHandler(function (error) {
            suggestBtn.disabled = false;
            suggestBtn.classList.remove('button--loading');
            showToast('AI返信案の生成に失敗しました: ' + (error && error.message ? error.message : String(error)), 'error');
          })
          .generateReplyDraft(company.threadId);
        return;
      }

      var resolveBtn = event.target.closest('[data-action="resolve"]');
      if (resolveBtn) {
        resolveBtn.disabled = true;
        resolveBtn.classList.add('button--loading');
        google.script.run
          .withSuccessHandler(function () {
            showToast('対応済みにしました。継続返信タブへ移動しました。', 'success');
            loadNewReplyTab();
            replyOngoingLoaded = false;
          })
          .withFailureHandler(function (error) {
            resolveBtn.disabled = false;
            resolveBtn.classList.remove('button--loading');
            showToast('更新に失敗しました: ' + (error && error.message ? error.message : String(error)), 'error');
          })
          .updateCompanyStatus(companyId, '対応中');
      }
    });

    // --- 継続返信（チャットUI） ---
    var ongoingCompanies = [];
    var ongoingLoadingEl = document.getElementById('reply-ongoing-loading');
    var ongoingEmptyEl = document.getElementById('reply-ongoing-empty');
    var ongoingListEl = document.getElementById('reply-ongoing-company-list');
    var chatThreadEl = document.getElementById('reply-chat-thread');

    function loadOngoingReplyTab() {
      ongoingLoadingEl.hidden = false;
      ongoingEmptyEl.hidden = true;
      ongoingListEl.innerHTML = '';

      google.script.run
        .withSuccessHandler(function (companies) {
          ongoingLoadingEl.hidden = true;
          ongoingCompanies = (companies || []).filter(function (c) {
            return c.hasReply === '返信あり' && c.sendStatus === '対応中';
          });
          if (ongoingCompanies.length === 0) {
            ongoingEmptyEl.hidden = false;
            return;
          }
          renderOngoingCompanyList();
        })
        .withFailureHandler(function (error) {
          ongoingLoadingEl.hidden = true;
          showToast('継続返信の取得に失敗しました: ' + (error && error.message ? error.message : String(error)), 'error');
        })
        .listCompanies({});
    }

    function renderOngoingCompanyList() {
      ongoingListEl.innerHTML = ongoingCompanies
        .map(function (c) {
          return (
            '<li><button type="button" class="reply-chat__company-button" data-company-id="' + escapeHtml(c.companyId) + '">' +
            '<span class="reply-chat__company-name">' + escapeHtml(c.companyName) + '</span>' +
            '<span class="reply-chat__company-owner">' + escapeHtml(c.ownerName) + '</span>' +
            '</button></li>'
          );
        })
        .join('');
    }

    ongoingListEl.addEventListener('click', function (event) {
      var btn = event.target.closest('.reply-chat__company-button');
      if (!btn) {
        return;
      }
      var companyId = btn.getAttribute('data-company-id');
      Array.prototype.forEach.call(ongoingListEl.querySelectorAll('.reply-chat__company-button'), function (b) {
        b.classList.toggle('is-active', b.getAttribute('data-company-id') === companyId);
      });
      loadChatThread(companyId);
    });

    function loadChatThread(companyId) {
      chatThreadEl.innerHTML = '<p class="empty-state">読み込み中…</p>';
      google.script.run
        .withSuccessHandler(function (threads) {
          renderChatThread(companyId, threads || []);
        })
        .withFailureHandler(function (error) {
          chatThreadEl.innerHTML = '<p class="error-message">' + escapeHtml(error && error.message ? error.message : String(error)) + '</p>';
        })
        .listCompanyMailHistory(companyId);
    }

    function renderChatThread(companyId, threads) {
      // GmailApp.search()は新しい順にスレッドを返すため（MailHistoryService.js参照）、
      // 最新スレッド（返信対象）はthreads[0]。
      var latestThreadId = threads.length > 0 ? threads[0].threadId : null;
      var allMessages = [];
      threads.forEach(function (thread) {
        thread.messages.forEach(function (m) {
          allMessages.push(m);
        });
      });
      // 日時は'yyyy-MM-dd HH:mm:ss'形式（文字列比較=時系列順）で並べ替え、
      // 複数スレッドをまたいでも時系列でチャット表示できるようにする。
      allMessages.sort(function (a, b) {
        return a.date < b.date ? -1 : a.date > b.date ? 1 : 0;
      });

      var messagesHtml = allMessages
        .map(function (m) {
          var isSent = m.direction === '送信';
          return (
            '<div class="reply-chat__message reply-chat__message--' + (isSent ? 'sent' : 'received') + '">' +
            '<div class="reply-chat__bubble">' + escapeHtml(m.body).replace(/\n/g, '<br>') + '</div>' +
            '<div class="reply-chat__meta">' + escapeHtml(m.date) + '</div>' +
            '</div>'
          );
        })
        .join('');

      chatThreadEl.innerHTML =
        '<div class="reply-chat__messages" id="reply-chat-messages">' + messagesHtml + '</div>' +
        '<div class="reply-chat__attachment-placeholder">📎 添付ファイル（今後対応予定）</div>' +
        '<div class="reply-chat__composer">' +
        '<button type="button" class="button button--secondary" id="chat-ai-suggest-button">AI返信案を作成</button>' +
        '<textarea id="chat-reply-textarea" rows="4" placeholder="返信を書く..."></textarea>' +
        '<button type="button" class="button" id="chat-reply-send-button">送信</button>' +
        '</div>';

      var messagesContainer = document.getElementById('reply-chat-messages');
      messagesContainer.scrollTop = messagesContainer.scrollHeight;

      document.getElementById('chat-ai-suggest-button').addEventListener('click', function () {
        if (!latestThreadId) {
          showToast('返信対象のスレッドが見つかりませんでした。', 'info');
          return;
        }
        var btn = document.getElementById('chat-ai-suggest-button');
        btn.disabled = true;
        btn.classList.add('button--loading');
        google.script.run
          .withSuccessHandler(function (draft) {
            btn.disabled = false;
            btn.classList.remove('button--loading');
            document.getElementById('chat-reply-textarea').value = draft || '';
          })
          .withFailureHandler(function (error) {
            btn.disabled = false;
            btn.classList.remove('button--loading');
            showToast('AI返信案の生成に失敗しました: ' + (error && error.message ? error.message : String(error)), 'error');
          })
          .generateReplyDraft(latestThreadId);
      });

      document.getElementById('chat-reply-send-button').addEventListener('click', function () {
        if (!latestThreadId) {
          showToast('返信対象のスレッドが見つかりませんでした。', 'info');
          return;
        }
        var textarea = document.getElementById('chat-reply-textarea');
        var body = textarea.value;
        if (!body) {
          showToast('返信内容を入力してください', 'info');
          return;
        }
        var confirmed = window.confirm(
          '━━━━━━━━━━━━━━\n' +
          '返信を送信します。\n\n' +
          '送信後は取り消せません。\n\n' +
          '送信しますか？\n' +
          '━━━━━━━━━━━━━━'
        );
        if (!confirmed) {
          return;
        }

        var sendBtn = document.getElementById('chat-reply-send-button');
        sendBtn.disabled = true;
        sendBtn.classList.add('button--loading');
        var toast = showToast('返信を送信しています…', 'loading', { persist: true });

        google.script.run
          .withSuccessHandler(function () {
            toast.update('返信を送信しました。', 'success');
            loadChatThread(companyId);
          })
          .withFailureHandler(function (error) {
            sendBtn.disabled = false;
            sendBtn.classList.remove('button--loading');
            toast.update('返信送信に失敗しました: ' + (error && error.message ? error.message : String(error)), 'error');
          })
          .replyInboxMessage(latestThreadId, body);
      });
    }
  })();
</script>
