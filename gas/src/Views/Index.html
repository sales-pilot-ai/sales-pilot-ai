<!DOCTYPE html>
<html>
  <head>
    <base target="_top" />
    <script>
      // IFRAMEサンドボックスでは初回表示後にトップレベルURLがgoogleusercontent.comの
      // サンドボックスURL(userCodeAppPanel等)に変わり、相対リンク（href="?page=xxx"）が
      // そちらを基準に解決されてしまう。そのため画面遷移はJavaScriptから
      // window.open(url, '_top') で絶対URL（exec URL）へ行う。
      var APP_BASE_URL = '<?= baseUrl ?>';

      function navigateToPage(page) {
        window.open(APP_BASE_URL + '?page=' + encodeURIComponent(page), '_top');
      }
    </script>
    <?!= include('Views/Style'); ?>
  </head>
  <body>
    <div class="toast-container" id="toast-container" aria-live="polite"></div>

    <? if (!user) { ?>
      <div class="permission-screen">
        <h1>権限が設定されていません</h1>
        <p>このアプリを利用するには管理者による利用登録が必要です。管理者にご連絡ください。</p>
      </div>
    <? } else if (accessDenied) { ?>
      <div class="permission-screen">
        <h1>アクセス権限がありません</h1>
        <p>この画面はAdmin権限を持つユーザーのみ利用できます。</p>
        <a class="button" href="#" data-page="dashboard">ホームへ戻る</a>
      </div>
    <? } else { ?>
      <div class="app-shell">
        <aside class="app-sidebar">
          <div class="app-sidebar__brand"><span aria-hidden="true">📊</span> Sales Pilot AI</div>
          <button class="app-sidebar__menu-toggle" id="menu-toggle" aria-label="メニュー">☰</button>

          <nav class="app-sidebar__nav" id="app-nav">
            <a class="app-sidebar__link<?= page === 'dashboard' ? ' is-active' : '' ?>" href="#" data-page="dashboard">
              <span aria-hidden="true">📊</span> Dashboard
            </a>
            <a class="app-sidebar__link<?= (page === 'companyList' || page === 'search' || page === 'inbox') ? ' is-active' : '' ?>" href="#" data-page="companyList">
              <span aria-hidden="true">📇</span> 営業管理
            </a>
            <? if (user.role === 'Admin') { ?>
              <a class="app-sidebar__link<?= page === 'templates' ? ' is-active' : '' ?>" href="#" data-page="templates">
                <span aria-hidden="true">📄</span> テンプレート
              </a>
            <? } ?>
            <a class="app-sidebar__link<?= page === 'dashboard' ? ' is-active' : '' ?>" href="#" data-page="dashboard" title="Dashboard画面の本日フォローすべき企業から確認できます">
              <span aria-hidden="true">📅</span> フォローアップ
            </a>
            <a class="app-sidebar__link<?= page === 'report' ? ' is-active' : '' ?>" href="#" data-page="report">
              <span aria-hidden="true">📈</span> レポート
            </a>
            <? if (user.role === 'Admin') { ?>
              <a class="app-sidebar__link<?= page === 'settings' ? ' is-active' : '' ?>" href="#" data-page="settings">
                <span aria-hidden="true">⚙️</span> 設定
              </a>
            <? } ?>
          </nav>

          <div class="app-sidebar__divider"></div>
          <div class="app-sidebar__user">
            <span aria-hidden="true">👤</span> <?= user.name ?>
          </div>
          <button type="button" class="app-sidebar__link app-sidebar__logout" id="logout-button">
            <span aria-hidden="true">🚪</span> ログアウト
          </button>
        </aside>

        <main class="app-main">
          <?!= include(pageTemplate); ?>
        </main>
      </div>
    <? } ?>

    <script>
      // 通知UI（Sprint6③）。alert()の代わりに使う共通トースト。成功/エラー/情報/処理中の
      // 4種類のタイプを持つ。処理中トーストはpersist:trueで自動では消えず、非同期処理の完了時に
      // update()で成功/エラー表示へ差し替える運用を想定する（例: showToast()で「処理中」を出し、
      // 完了時にhandle.update('完了しました', 'success')を呼ぶ）。
      // 各画面（Dashboard/CompanyList/Inbox等）の<script>から共通で呼び出せるようwindowに公開する。
      function showToast(message, type, options) {
        type = type || 'info';
        options = options || {};
        var container = document.getElementById('toast-container');
        var el = document.createElement('div');
        el.className = 'toast toast--' + type;
        el.setAttribute('role', type === 'error' ? 'alert' : 'status');
        el.textContent = message;
        container.appendChild(el);

        var timeoutId = null;

        function scheduleAutoClose(opts) {
          if (opts.persist) {
            return;
          }
          timeoutId = setTimeout(close, opts.duration || (type === 'error' ? 5000 : 3000));
        }

        function close() {
          if (timeoutId) {
            clearTimeout(timeoutId);
          }
          if (el.parentNode) {
            el.parentNode.removeChild(el);
          }
        }

        scheduleAutoClose(options);

        return {
          update: function (newMessage, newType, newOptions) {
            newOptions = newOptions || {};
            if (timeoutId) {
              clearTimeout(timeoutId);
              timeoutId = null;
            }
            type = newType || type;
            el.className = 'toast toast--' + type;
            el.setAttribute('role', type === 'error' ? 'alert' : 'status');
            el.textContent = newMessage;
            scheduleAutoClose(newOptions);
          },
          close: close,
        };
      }
      window.showToast = showToast;

      var menuToggle = document.getElementById('menu-toggle');
      if (menuToggle) {
        menuToggle.addEventListener('click', function () {
          document.getElementById('app-nav').classList.toggle('is-open');
        });
      }

      // data-page属性を持つリンクはすべてこのハンドラーで absolute URL 遷移する
      // （Dashboard.html / CompanyList.html 等、includeされた画面内のリンクも対象）。
      document.body.addEventListener('click', function (event) {
        var link = event.target.closest('[data-page]');
        if (!link) {
          return;
        }
        event.preventDefault();
        navigateToPage(link.getAttribute('data-page'));
      });

      // ログアウト（Sprint8①）。アプリ側では独自のセッション・トークン管理を持たず、
      // Googleアカウント自体のログアウトページへ遷移させるだけに留める。
      var logoutButton = document.getElementById('logout-button');
      if (logoutButton) {
        logoutButton.addEventListener('click', function () {
          var confirmed = window.confirm(
            '━━━━━━━━━━━━━━━━━━\n' +
            'Googleアカウント全体からログアウトします。\n\n' +
            'ログアウトしますか？\n' +
            '━━━━━━━━━━━━━━━━━━'
          );
          if (!confirmed) {
            return;
          }
          window.open('https://accounts.google.com/Logout', '_top');
        });
      }
    </script>
  </body>
</html>
