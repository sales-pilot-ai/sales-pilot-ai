<section class="settings">
  <!-- Gmail設定（送信者情報）: 追加依頼によりUser/Admin共通で表示し、自分自身の情報のみ
       編集できるようにした（署名に使う名前・電話番号・メールアドレスをユーザーごとに
       個別管理する）。 -->
  <p id="sender-info-loading" class="empty-state">読み込み中…</p>
  <p id="sender-info-error" class="error-message" hidden></p>
  <form id="sender-info-form" hidden>
    <div class="settings__section">
      <h2>Gmail設定（送信者情報）</h2>
      <p class="templates__placeholder-hint">
        営業メール・返信メールの署名に使用する、あなた自身の情報です。実際の送信は、ログイン中のGoogleアカウントのGmailから行われます。
      </p>
      <label for="sender-info-name">担当者名</label>
      <input type="text" id="sender-info-name" required />
      <label for="sender-info-tel">電話番号</label>
      <input type="text" id="sender-info-tel" required />
      <label for="sender-info-mail">メールアドレス</label>
      <input type="email" id="sender-info-mail" required />
      <button type="submit" class="button" id="sender-info-save-button">保存</button>
    </div>
  </form>

  <!-- 以下はAdmin専用セクション（Gemini API設定・システム設定・デフォルト値設定・
       ユーザー管理）。設定画面自体はUser/Adminともにアクセスできるようにしたため、
       このコンテナごとクライアント側の役割判定で表示・非表示を切り替える
       （サーバー側のRouter層では引き続きrequireAdmin_()で個別に保護している）。 -->
  <div id="admin-settings-root" hidden>
    <p id="settings-loading" class="empty-state">読み込み中…</p>
    <p id="settings-error" class="error-message" hidden></p>

    <form id="settings-form" hidden>
      <div class="settings__section">
        <h2>Gemini API設定</h2>
        <label for="setting-gemini-api-key">APIキー <span id="setting-gemini-api-key-status" class="settings__key-status"></span></label>
        <input type="password" id="setting-gemini-api-key" placeholder="変更する場合のみ入力してください" autocomplete="new-password" />
        <label for="setting-gemini-model">使用モデル</label>
        <input type="text" id="setting-gemini-model" />
      </div>

      <div class="settings__section">
        <h2>システム設定</h2>
        <label for="setting-spreadsheet-id">スプレッドシートID</label>
        <input type="text" id="setting-spreadsheet-id" required />
        <label for="setting-maps-api-key">Google Maps APIキー <span id="setting-maps-api-key-status" class="settings__key-status"></span></label>
        <input type="password" id="setting-maps-api-key" placeholder="変更する場合のみ入力してください" autocomplete="new-password" />
      </div>

      <div class="settings__section">
        <h2>デフォルト値設定</h2>
        <label for="setting-timerex-url">TimeRex（日程調整）URL</label>
        <input type="text" id="setting-timerex-url" />
      </div>

      <button type="submit" class="button" id="settings-save-button">保存</button>
    </form>

    <!-- ユーザー管理（Sprint8⑤、Admin専用）。設定フォームとは独立した一覧＋都度保存の
         操作のため、上記フォームには含めず別セクションにする。 -->
    <div class="settings__section">
      <div class="templates__section-header">
        <h2>ユーザー管理</h2>
        <button type="button" class="button" id="user-create-button">新規ユーザー追加</button>
      </div>
      <p id="user-list-loading" class="empty-state">読み込み中…</p>
      <p id="user-list-error" class="error-message" hidden></p>
      <table class="company-table" id="user-table" hidden>
        <thead>
          <tr>
            <th>名前</th>
            <th>メールアドレス</th>
            <th>権限</th>
            <th>作成日時</th>
            <th>最終ログイン日時</th>
            <th>操作</th>
          </tr>
        </thead>
        <tbody id="user-table-body"></tbody>
      </table>
    </div>
  </div>
</section>

<div class="modal-overlay" id="user-create-modal" hidden>
  <div class="modal">
    <button type="button" class="modal__close" id="user-create-modal-close" aria-label="閉じる">×</button>
    <h2>新規ユーザー追加</h2>
    <label for="user-create-name">名前</label>
    <input type="text" id="user-create-name" />
    <label for="user-create-email">メールアドレス</label>
    <input type="email" id="user-create-email" />
    <label for="user-create-role">権限</label>
    <select id="user-create-role">
      <option value="User">User</option>
      <option value="Admin">Admin</option>
    </select>
    <div class="company-list__bulk-actions">
      <button type="button" class="button button--secondary" id="user-create-cancel-button">キャンセル</button>
      <button type="button" class="button" id="user-create-save-button">追加</button>
    </div>
  </div>
</div>

<script>
  (function () {
    // ===== Gmail設定（送信者情報）: User/Admin共通、自分自身の情報のみ（追加依頼） =====

    var senderInfoLoadingEl = document.getElementById('sender-info-loading');
    var senderInfoErrorEl = document.getElementById('sender-info-error');
    var senderInfoFormEl = document.getElementById('sender-info-form');
    var senderInfoNameInput = document.getElementById('sender-info-name');
    var senderInfoTelInput = document.getElementById('sender-info-tel');
    var senderInfoMailInput = document.getElementById('sender-info-mail');

    function loadSenderInfo() {
      senderInfoLoadingEl.hidden = false;
      senderInfoErrorEl.hidden = true;
      senderInfoFormEl.hidden = true;

      google.script.run
        .withSuccessHandler(function (info) {
          senderInfoLoadingEl.hidden = true;
          senderInfoFormEl.hidden = false;
          info = info || {};
          senderInfoNameInput.value = info.name || '';
          senderInfoTelInput.value = info.tel || '';
          senderInfoMailInput.value = info.mail || '';
        })
        .withFailureHandler(function (error) {
          senderInfoLoadingEl.hidden = true;
          senderInfoErrorEl.hidden = false;
          senderInfoErrorEl.textContent = error && error.message ? error.message : String(error);
        })
        .getMySenderInfo();
    }

    senderInfoFormEl.addEventListener('submit', function (event) {
      event.preventDefault();

      var data = {
        name: senderInfoNameInput.value,
        tel: senderInfoTelInput.value,
        mail: senderInfoMailInput.value,
      };

      var saveButton = document.getElementById('sender-info-save-button');
      var originalText = saveButton.textContent;
      saveButton.disabled = true;
      saveButton.classList.add('button--loading');
      var toast = showToast('保存しています…', 'loading', { persist: true });

      google.script.run
        .withSuccessHandler(function (info) {
          saveButton.disabled = false;
          saveButton.classList.remove('button--loading');
          saveButton.textContent = originalText;
          toast.update('Gmail設定（送信者情報）を保存しました。', 'success');
          info = info || {};
          senderInfoNameInput.value = info.name || '';
          senderInfoTelInput.value = info.tel || '';
          senderInfoMailInput.value = info.mail || '';
        })
        .withFailureHandler(function (error) {
          saveButton.disabled = false;
          saveButton.classList.remove('button--loading');
          saveButton.textContent = originalText;
          toast.update('保存に失敗しました: ' + (error && error.message ? error.message : String(error)), 'error');
        })
        .updateMySenderInfo(data);
    });

    // ===== Admin専用セクション（Gemini API設定・システム設定・デフォルト値設定） =====

    var loadingEl = document.getElementById('settings-loading');
    var errorEl = document.getElementById('settings-error');
    var formEl = document.getElementById('settings-form');

    var geminiApiKeyInput = document.getElementById('setting-gemini-api-key');
    var geminiApiKeyStatusEl = document.getElementById('setting-gemini-api-key-status');
    var geminiModelInput = document.getElementById('setting-gemini-model');
    var spreadsheetIdInput = document.getElementById('setting-spreadsheet-id');
    var mapsApiKeyInput = document.getElementById('setting-maps-api-key');
    var mapsApiKeyStatusEl = document.getElementById('setting-maps-api-key-status');
    var timeRexUrlInput = document.getElementById('setting-timerex-url');

    function loadSettings() {
      loadingEl.hidden = false;
      errorEl.hidden = true;
      formEl.hidden = true;

      google.script.run
        .withSuccessHandler(function (settings) {
          loadingEl.hidden = true;
          formEl.hidden = false;
          applySettings(settings || {});
        })
        .withFailureHandler(function (error) {
          loadingEl.hidden = true;
          errorEl.hidden = false;
          errorEl.textContent = error && error.message ? error.message : String(error);
        })
        .getSettings();
    }

    // APIキーの入力欄は常に空欄のまま表示する（値そのものは画面へ返さない設計。
    // 「設定済み/未設定」のみをラベル横に表示し、変更したい場合だけ入力してもらう）。
    function applySettings(settings) {
      geminiModelInput.value = settings.geminiModel || '';
      spreadsheetIdInput.value = settings.spreadsheetId || '';
      timeRexUrlInput.value = settings.timeRexUrl || '';
      geminiApiKeyInput.value = '';
      mapsApiKeyInput.value = '';
      geminiApiKeyStatusEl.textContent = settings.geminiApiKeySet ? '（設定済み）' : '（未設定）';
      mapsApiKeyStatusEl.textContent = settings.mapsApiKeySet ? '（設定済み）' : '（未設定）';
    }

    formEl.addEventListener('submit', function (event) {
      event.preventDefault();

      var data = {
        geminiModel: geminiModelInput.value,
        spreadsheetId: spreadsheetIdInput.value,
        timeRexUrl: timeRexUrlInput.value,
      };
      // 空欄のまま送信した場合は既存のAPIキーを変更しない（Config/Settings.jsのupdateSettings_参照）。
      if (geminiApiKeyInput.value) {
        data.geminiApiKey = geminiApiKeyInput.value;
      }
      if (mapsApiKeyInput.value) {
        data.mapsApiKey = mapsApiKeyInput.value;
      }

      var saveButton = document.getElementById('settings-save-button');
      var originalText = saveButton.textContent;
      saveButton.disabled = true;
      saveButton.classList.add('button--loading');
      var toast = showToast('保存しています…', 'loading', { persist: true });

      google.script.run
        .withSuccessHandler(function (settings) {
          saveButton.disabled = false;
          saveButton.classList.remove('button--loading');
          saveButton.textContent = originalText;
          toast.update('設定を保存しました。', 'success');
          applySettings(settings || {});
        })
        .withFailureHandler(function (error) {
          saveButton.disabled = false;
          saveButton.classList.remove('button--loading');
          saveButton.textContent = originalText;
          toast.update('保存に失敗しました: ' + (error && error.message ? error.message : String(error)), 'error');
        })
        .updateSettings(data);
    });

    // ===== ユーザー管理（Sprint8⑤、Admin専用） =====

    var users = [];
    var currentUserEmail = null;
    var userListLoadingEl = document.getElementById('user-list-loading');
    var userListErrorEl = document.getElementById('user-list-error');
    var userTableEl = document.getElementById('user-table');
    var userTbody = document.getElementById('user-table-body');
    var userCreateModal = document.getElementById('user-create-modal');
    var userCreateNameInput = document.getElementById('user-create-name');
    var userCreateEmailInput = document.getElementById('user-create-email');
    var userCreateRoleSelect = document.getElementById('user-create-role');

    function escapeHtml(value) {
      return String(value == null ? '' : value).replace(/[&<>"']/g, function (ch) {
        return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[ch];
      });
    }

    function loadUserList() {
      userListLoadingEl.hidden = false;
      userListErrorEl.hidden = true;
      userTableEl.hidden = true;

      google.script.run
        .withSuccessHandler(function (result) {
          userListLoadingEl.hidden = true;
          userTableEl.hidden = false;
          users = result || [];
          renderUserTable();
        })
        .withFailureHandler(function (error) {
          userListLoadingEl.hidden = true;
          userListErrorEl.hidden = false;
          userListErrorEl.textContent = error && error.message ? error.message : String(error);
        })
        .listUsers();
    }

    function isSelf(email) {
      return currentUserEmail && String(email).trim().toLowerCase() === String(currentUserEmail).trim().toLowerCase();
    }

    // Adminが1人だけの場合、その1人の権限変更・削除をボタン段階で防ぐ（サーバー側の
    // updateUserRole_/deleteUser_のガードと同じ条件をUI側でも反映し、無効な操作を
    // 事前に減らす。最終的な強制力はサーバー側にある）。
    function isLastAdmin(user) {
      if (user.role !== 'Admin') {
        return false;
      }
      return users.filter(function (u) {
        return u.role === 'Admin';
      }).length <= 1;
    }

    function renderUserTable() {
      userTbody.innerHTML = users
        .map(function (u) {
          var lastAdmin = isLastAdmin(u);
          var self = isSelf(u.email);
          var roleOptions = ['User', 'Admin']
            .map(function (r) {
              return '<option value="' + r + '"' + (u.role === r ? ' selected' : '') + '>' + r + '</option>';
            })
            .join('');
          return (
            '<tr data-email="' + escapeHtml(u.email) + '">' +
            '<td><input type="text" class="user-name-input" data-email="' + escapeHtml(u.email) + '" value="' + escapeHtml(u.name) + '" aria-label="名前" /></td>' +
            '<td>' + escapeHtml(u.email) + '</td>' +
            '<td><select class="user-role-select" data-email="' + escapeHtml(u.email) + '"' + (lastAdmin ? ' disabled title="最後の1人のAdminは変更できません"' : '') + '>' + roleOptions + '</select></td>' +
            '<td>' + escapeHtml(u.createdAt) + '</td>' +
            '<td>' + escapeHtml(u.lastLoginAt) + '</td>' +
            '<td>' +
            '<button type="button" class="button button--secondary" data-action="delete" data-email="' + escapeHtml(u.email) + '"' +
            (self || lastAdmin ? ' disabled title="' + (self ? '自分自身は削除できません' : '最後の1人のAdminは削除できません') + '"' : '') +
            '>削除</button>' +
            '</td>' +
            '</tr>'
          );
        })
        .join('');
    }

    document.getElementById('user-create-button').addEventListener('click', function () {
      userCreateNameInput.value = '';
      userCreateEmailInput.value = '';
      userCreateRoleSelect.value = 'User';
      userCreateModal.hidden = false;
    });

    document.getElementById('user-create-modal-close').addEventListener('click', function () {
      userCreateModal.hidden = true;
    });
    document.getElementById('user-create-cancel-button').addEventListener('click', function () {
      userCreateModal.hidden = true;
    });
    userCreateModal.addEventListener('click', function (event) {
      if (event.target === userCreateModal) {
        userCreateModal.hidden = true;
      }
    });

    document.getElementById('user-create-save-button').addEventListener('click', function () {
      var data = {
        name: userCreateNameInput.value,
        email: userCreateEmailInput.value,
        role: userCreateRoleSelect.value,
      };
      if (!data.name || !data.email) {
        showToast('名前・メールアドレスを入力してください。', 'info');
        return;
      }

      var saveButton = document.getElementById('user-create-save-button');
      saveButton.disabled = true;
      saveButton.classList.add('button--loading');
      var toast = showToast('追加しています…', 'loading', { persist: true });

      google.script.run
        .withSuccessHandler(function () {
          saveButton.disabled = false;
          saveButton.classList.remove('button--loading');
          toast.update('ユーザーを追加しました。', 'success');
          userCreateModal.hidden = true;
          loadUserList();
        })
        .withFailureHandler(function (error) {
          saveButton.disabled = false;
          saveButton.classList.remove('button--loading');
          toast.update('追加に失敗しました: ' + (error && error.message ? error.message : String(error)), 'error');
        })
        .createUser(data);
    });

    userTbody.addEventListener('change', function (event) {
      var select = event.target.closest('.user-role-select');
      if (!select) {
        return;
      }
      var email = select.getAttribute('data-email');
      var newRole = select.value;
      select.disabled = true;
      var toast = showToast('権限を変更しています…', 'loading', { persist: true });

      google.script.run
        .withSuccessHandler(function () {
          toast.update('権限を変更しました。', 'success');
          loadUserList();
        })
        .withFailureHandler(function (error) {
          select.disabled = false;
          toast.update('権限変更に失敗しました: ' + (error && error.message ? error.message : String(error)), 'error');
          loadUserList();
        })
        .updateUserRole(email, newRole);
    });

    // 名前の編集（追加依頼）。名前セルは常時入力可能なテキスト欄で、値を変えてフォーカスを
    // 外す（blur）と保存する。自分自身の名前も変更可能（権限変更・削除にある「自分自身は
    // 不可」の保護は適用しない）。メールアドレス・権限・作成日時・最終ログイン日時には
    // 影響しない。
    function handleUserNameChange(input) {
      var email = input.getAttribute('data-email');
      var newName = input.value.trim();
      var user = users.filter(function (u) {
        return u.email === email;
      })[0];
      var previousName = user ? user.name : '';

      if (!newName) {
        showToast('名前を入力してください。', 'info');
        input.value = previousName;
        return;
      }
      if (newName === previousName) {
        return;
      }

      input.disabled = true;
      var toast = showToast('名前を変更しています…', 'loading', { persist: true });

      google.script.run
        .withSuccessHandler(function () {
          toast.update('名前を変更しました。', 'success');
          loadUserList();
        })
        .withFailureHandler(function (error) {
          input.disabled = false;
          input.value = previousName;
          toast.update('名前の変更に失敗しました: ' + (error && error.message ? error.message : String(error)), 'error');
        })
        .updateUserName(email, newName);
    }

    userTbody.addEventListener('change', function (event) {
      var nameInput = event.target.closest('.user-name-input');
      if (!nameInput) {
        return;
      }
      handleUserNameChange(nameInput);
    });

    // Enterキーでも確定できるよう、blur()を呼んでchangeイベントを発火させる。
    userTbody.addEventListener('keydown', function (event) {
      if (event.key !== 'Enter') {
        return;
      }
      var nameInput = event.target.closest('.user-name-input');
      if (!nameInput) {
        return;
      }
      event.preventDefault();
      nameInput.blur();
    });

    userTbody.addEventListener('click', function (event) {
      var button = event.target.closest('[data-action="delete"]');
      if (!button) {
        return;
      }
      var email = button.getAttribute('data-email');
      var confirmed = window.confirm('本当に削除しますか？\n\n' + email);
      if (!confirmed) {
        return;
      }

      button.disabled = true;
      button.classList.add('button--loading');
      var toast = showToast('削除しています…', 'loading', { persist: true });

      google.script.run
        .withSuccessHandler(function () {
          toast.update('削除しました。', 'success');
          loadUserList();
        })
        .withFailureHandler(function (error) {
          button.disabled = false;
          button.classList.remove('button--loading');
          toast.update('削除に失敗しました: ' + (error && error.message ? error.message : String(error)), 'error');
        })
        .deleteUser(email);
    });

    // ===== 初期化: 役割判定してAdmin専用セクションの表示可否を決める（追加依頼） =====
    // Gmail設定（送信者情報）はUser/Admin共通のため常に読み込む。Admin専用セクション
    // （Gemini API設定・システム設定・デフォルト値設定・ユーザー管理）は、getCurrentUser()の
    // roleがAdminの場合のみ表示・読み込みする。UI側の表示切り替えに加え、各Router関数
    // （getSettings/updateSettings/listUsers/createUser/updateUserRole/deleteUser）は
    // サーバー側でも引き続きrequireAdmin_()により保護されている。
    var adminSettingsRootEl = document.getElementById('admin-settings-root');

    loadSenderInfo();

    google.script.run
      .withSuccessHandler(function (user) {
        currentUserEmail = user && user.email ? user.email : null;
        if (user && user.role === 'Admin') {
          adminSettingsRootEl.hidden = false;
          loadSettings();
          loadUserList();
        }
      })
      .withFailureHandler(function () {
        // 権限判定に失敗した場合はAdmin専用セクションを表示しない（安全側に倒す）。
      })
      .getCurrentUser();
  })();
</script>
