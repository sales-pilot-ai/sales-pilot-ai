<style>
  :root {
    --color-bg: #ffffff;
    --color-text: #202124;
    --color-text-muted: #5f6368;
    --color-accent: #1a73e8;
    --color-border: #e0e0e0;
    --color-disabled: #9aa0a6;
    --color-error: #d93025;
    --color-success: #1e8e3e;
    --color-info: #323232;
    --color-surface-muted: #f8f9fa;
  }

  * {
    box-sizing: border-box;
  }

  body {
    margin: 0;
    background: var(--color-bg);
    color: var(--color-text);
    font-family: 'Roboto', 'Noto Sans JP', -apple-system, BlinkMacSystemFont, sans-serif;
    font-size: 14px;
    line-height: 1.6;
  }

  /* 共通レイアウト（左サイドバー、Sprint8③）。 */
  .app-shell {
    display: flex;
    align-items: stretch;
    min-height: 100vh;
  }

  .app-sidebar {
    display: flex;
    flex-direction: column;
    width: 240px;
    flex-shrink: 0;
    padding: 20px 16px;
    border-right: 1px solid var(--color-border);
  }

  .app-sidebar__brand {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 18px;
    font-weight: 700;
    color: var(--color-accent);
    white-space: nowrap;
    padding: 0 12px;
  }

  .app-sidebar__menu-toggle {
    display: none;
    background: none;
    border: none;
    font-size: 20px;
    cursor: pointer;
    align-self: flex-end;
  }

  .app-sidebar__nav {
    display: flex;
    flex-direction: column;
    gap: 4px;
    margin-top: 24px;
    flex: 1;
  }

  .app-sidebar__link {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 12px;
    border-radius: 6px;
    text-decoration: none;
    color: var(--color-text);
    cursor: pointer;
    font-size: 14px;
    font-family: inherit;
    background: none;
    border: none;
    width: 100%;
    text-align: left;
    transition: background-color 0.15s ease, color 0.15s ease;
  }

  .app-sidebar__link:hover {
    background: var(--color-surface-muted);
    color: var(--color-accent);
  }

  .app-sidebar__link.is-active {
    background: var(--color-surface-muted);
    color: var(--color-accent);
    font-weight: 700;
  }

  .app-sidebar__divider {
    border-top: 1px solid var(--color-border);
    margin: 16px 0;
  }

  .app-sidebar__user {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 12px;
    color: var(--color-text-muted);
    font-size: 13px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .app-sidebar__logout {
    color: var(--color-error);
  }

  .app-sidebar__logout:hover {
    background: var(--color-surface-muted);
    color: var(--color-error);
  }

  .app-main {
    flex: 1;
    padding: 32px 24px;
    min-width: 0;
  }

  .permission-screen {
    max-width: 480px;
    margin: 15vh auto 0;
    padding: 32px;
    text-align: center;
  }

  .permission-screen h1 {
    font-size: 20px;
  }

  .permission-screen p {
    color: var(--color-text-muted);
  }

  .dashboard__cards {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 16px;
    margin-bottom: 32px;
  }

  .card {
    position: relative;
    border: 1px solid var(--color-border);
    border-radius: 8px;
    padding: 20px;
    text-align: center;
    background: var(--color-bg);
  }

  .card--clickable {
    cursor: pointer;
    transition:
      transform 0.15s ease,
      box-shadow 0.15s ease,
      border-color 0.15s ease;
  }

  .card--clickable:hover {
    transform: translateY(-2px);
    border-color: var(--color-accent);
    box-shadow: 0 4px 12px rgba(26, 115, 232, 0.15);
  }

  .card--clickable:active {
    transform: translateY(0);
    box-shadow: 0 1px 4px rgba(26, 115, 232, 0.15);
  }

  .card--clickable:focus-visible {
    outline: 2px solid var(--color-accent);
    outline-offset: 2px;
  }

  .card__icon {
    font-size: 20px;
    line-height: 1;
    margin-bottom: 8px;
    opacity: 0.85;
  }

  .card__value {
    font-size: 28px;
    font-weight: 700;
    color: var(--color-accent);
    font-variant-numeric: tabular-nums;
  }

  .card__label {
    margin-top: 8px;
    color: var(--color-text-muted);
  }

  .card__sublabel {
    display: block;
    margin-top: 2px;
    font-size: 11px;
    color: var(--color-disabled);
  }

  .dashboard__metrics {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 16px;
    margin-bottom: 32px;
  }

  .card--metric {
    background: var(--color-surface-muted);
  }

  .card__value--metric {
    color: var(--color-text);
  }

  .dashboard__actions {
    display: flex;
    gap: 12px;
    margin-bottom: 32px;
  }

  .button {
    display: inline-block;
    padding: 10px 20px;
    border-radius: 6px;
    border: 1px solid var(--color-accent);
    background: var(--color-accent);
    color: #fff;
    font-size: 14px;
    text-decoration: none;
    cursor: pointer;
  }

  .button:disabled {
    background: #fff;
    color: var(--color-disabled);
    border-color: var(--color-border);
    cursor: not-allowed;
  }

  .button--secondary {
    background: #fff;
    color: var(--color-accent);
  }

  .button--secondary.is-active {
    background: var(--color-accent);
    color: #fff;
  }

  /* 処理中のボタンにスピナーを表示する（Sprint6④）。処理中のボタンは同時にdisabledにもなり
     .button:disabledの配色（白背景・グレー文字）が適用されるため、スピナーもそれに合わせた
     グレー基調にし、primary/secondaryどちらのボタンでも同じ見た目になるようにする。 */
  .button--loading {
    position: relative;
    padding-left: 32px;
  }

  .button--loading::before {
    content: '';
    position: absolute;
    left: 10px;
    top: 50%;
    width: 14px;
    height: 14px;
    margin-top: -7px;
    border: 2px solid var(--color-border);
    border-top-color: var(--color-text-muted);
    border-radius: 50%;
    animation: button-spin 0.6s linear infinite;
  }

  @keyframes button-spin {
    to {
      transform: rotate(360deg);
    }
  }

  .dashboard__followups h2 {
    font-size: 16px;
    margin-bottom: 12px;
  }

  .empty-state {
    color: var(--color-text-muted);
  }

  .error-message {
    color: var(--color-error);
  }

  input[type='text'],
  input[type='number'],
  select {
    padding: 8px 10px;
    border: 1px solid var(--color-border);
    border-radius: 4px;
    font-size: 14px;
  }

  .search__form {
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    gap: 16px;
    margin-bottom: 24px;
  }

  .search__form label {
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .search__checkbox {
    gap: 8px !important;
  }

  .search__review {
    max-width: 480px;
  }

  .candidate-card {
    border: 1px solid var(--color-border);
    border-radius: 8px;
    padding: 20px;
    margin-bottom: 16px;
  }

  .candidate-card__name {
    font-size: 16px;
    font-weight: 700;
    margin-bottom: 8px;
  }

  .candidate-card__line {
    color: var(--color-text-muted);
    margin-bottom: 4px;
  }

  .candidate-card__actions {
    display: flex;
    justify-content: flex-end;
    gap: 12px;
    margin-top: 16px;
  }

  .search__bulk-actions {
    display: flex;
    gap: 12px;
    margin-bottom: 24px;
  }

  .search__summary {
    color: var(--color-text-muted);
  }

  /* タスク2-2: 検索ボックス・業種・送信状況・送信可否・絞り込むボタンを
     「絞り込み」の1グループとして視覚的にまとめる。 */
  .company-list__filter-group {
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    gap: 12px;
    padding: 14px 16px;
    margin-bottom: 20px;
    background: var(--color-surface-muted);
    border-radius: 8px;
  }

  .company-list__filter-group-label {
    font-size: 13px;
    font-weight: 700;
    color: var(--color-text-muted);
    white-space: nowrap;
  }

  .company-list__filters {
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    gap: 12px;
    flex: 1;
  }

  /* ヘッダーが列幅不足で1文字ずつ縦に折り返されるのを防ぐため、テーブルを
     .company-table__scroll でラップし、幅が収まらない場合は横スクロールさせる
     （デスクトップ幅でも常時有効。モバイル向けの折り返し防止は既存の
     @media (max-width: 768px) 内の.company-tableルールがそのまま担当する）。 */
  .company-table__scroll {
    overflow-x: auto;
  }

  .company-table {
    width: 100%;
    border-collapse: collapse;
  }

  .company-table th,
  .company-table td {
    border-bottom: 1px solid var(--color-border);
    padding: 10px 8px;
    text-align: left;
    font-size: 13px;
  }

  .company-table th {
    color: var(--color-text-muted);
    font-weight: 700;
    white-space: nowrap;
  }

  /* 会社名列（チェックボックス列の次）は、他の見出しをnowrap化した際に
     詰まりすぎて読みにくくならないよう最小幅を確保する。 */
  .company-table th:nth-child(2) {
    min-width: 140px;
  }

  .company-list__pagination {
    display: flex;
    gap: 8px;
    margin-top: 16px;
  }

  .company-list__status-filter {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 16px;
  }

  /* タスク2-3: ステータス絞り込みは「押すと何かが実行されるボタン」とは見た目を
     明確に分け、チップ／トグル風（角丸大きめ・薄背景・選択中のみ塗り）にする。 */
  .status-chip {
    display: inline-flex;
    align-items: center;
    padding: 6px 16px;
    border-radius: 999px;
    border: 1px solid var(--color-border);
    background: var(--color-surface-muted);
    color: var(--color-text-muted);
    font-size: 13px;
    font-family: inherit;
    cursor: pointer;
  }

  .status-chip.is-active {
    background: var(--color-accent);
    border-color: var(--color-accent);
    color: #fff;
    font-weight: 700;
  }

  .company-list__selection {
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    gap: 12px;
    margin-bottom: 16px;
  }

  .company-list__bulk-actions {
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    gap: 8px;
  }

  /* タスク2-4: 「選択した企業に対する操作」であることを明示する小見出し。 */
  .company-list__bulk-actions-label {
    font-size: 13px;
    font-weight: 700;
    color: var(--color-text-muted);
    white-space: nowrap;
  }

  .company-list__bulk-progress {
    color: var(--color-text-muted);
    display: flex;
    flex-direction: column;
    gap: 4px;
    min-width: 200px;
  }

  .company-list__bulk-progress-label {
    font-size: 12px;
  }

  .progress-bar {
    width: 100%;
    height: 6px;
    border-radius: 3px;
    background: var(--color-border);
    overflow: hidden;
  }

  .progress-bar__fill {
    height: 100%;
    width: 0%;
    background: var(--color-accent);
    border-radius: 3px;
    transition: width 0.2s ease;
  }

  /* 営業管理タブ（Sprint8④）。Dashboard/Settings/Reportと同じボタン・カード・配色の
     語彙をそのまま使い、新しいUIパターンは追加しない。 */
  .sales-tabs,
  .sales-subtabs {
    display: flex;
    gap: 8px;
    margin-bottom: 20px;
    border-bottom: 1px solid var(--color-border);
  }

  /* タスク2-1: 「企業を追加」導線をタブ行の右端に配置するため、.sales-tabsのみ
     両端揃えにする（.sales-subtabsは従来通りタブの並びのみ）。 */
  .sales-tabs {
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
  }

  .sales-tabs__list {
    display: flex;
    gap: 8px;
  }

  .sales-tabs__add-company {
    margin-bottom: 8px;
  }

  .sales-tabs__tab,
  .sales-subtabs__tab {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 10px 16px;
    background: none;
    border: none;
    border-bottom: 2px solid transparent;
    font-size: 14px;
    font-family: inherit;
    color: var(--color-text-muted);
    cursor: pointer;
  }

  .sales-tabs__tab.is-active,
  .sales-subtabs__tab.is-active {
    color: var(--color-accent);
    font-weight: 700;
    border-bottom-color: var(--color-accent);
  }

  .sales-tabs__badge {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-width: 20px;
    height: 20px;
    padding: 0 6px;
    border-radius: 10px;
    background: var(--color-error);
    color: #fff;
    font-size: 11px;
    font-weight: 700;
  }

  .sales-send__toolbar {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 16px;
  }

  /* 返信を同期ボタン（タスクA: 返信同期機能の復活）。 */
  .reply-sync-bar {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 16px;
  }

  .reply-sync-bar__icon {
    display: inline-block;
  }

  .reply-sync-bar__last-synced {
    font-size: 12px;
    color: var(--color-text-muted);
  }

  .reply-new-list {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .reply-card {
    border: 1px solid var(--color-border);
    border-radius: 8px;
    padding: 16px;
  }

  .reply-card__header {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 8px;
  }

  .reply-card__company {
    font-weight: 700;
  }

  .reply-card__owner {
    color: var(--color-text-muted);
    font-size: 12px;
  }

  .reply-card__snippet {
    color: var(--color-text-muted);
    margin-bottom: 12px;
  }

  .reply-card__ai {
    background: var(--color-surface-muted);
    border-radius: 6px;
    padding: 10px 12px;
    margin-bottom: 12px;
    font-size: 13px;
    white-space: pre-wrap;
  }

  .reply-card__actions {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }

  .reply-chat {
    display: flex;
    gap: 16px;
    min-height: 480px;
  }

  .reply-chat__list {
    width: 240px;
    flex-shrink: 0;
    border-right: 1px solid var(--color-border);
    padding-right: 16px;
  }

  .reply-chat__company-list {
    list-style: none;
    margin: 0;
    padding: 0;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .reply-chat__company-button {
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    width: 100%;
    padding: 10px 12px;
    border: none;
    border-radius: 6px;
    background: none;
    font-family: inherit;
    cursor: pointer;
    text-align: left;
  }

  .reply-chat__company-button:hover,
  .reply-chat__company-button.is-active {
    background: var(--color-surface-muted);
  }

  .reply-chat__company-name {
    font-weight: 700;
  }

  .reply-chat__company-owner {
    color: var(--color-text-muted);
    font-size: 12px;
  }

  .reply-chat__thread {
    flex: 1;
    display: flex;
    flex-direction: column;
    min-width: 0;
  }

  .reply-chat__messages {
    flex: 1;
    overflow-y: auto;
    max-height: 360px;
    padding: 8px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .reply-chat__message {
    display: flex;
    flex-direction: column;
    max-width: 70%;
  }

  .reply-chat__message--sent {
    align-self: flex-end;
    align-items: flex-end;
  }

  .reply-chat__message--received {
    align-self: flex-start;
    align-items: flex-start;
  }

  .reply-chat__bubble {
    padding: 10px 14px;
    border-radius: 12px;
    white-space: pre-wrap;
    word-break: break-word;
  }

  .reply-chat__message--sent .reply-chat__bubble {
    background: var(--color-accent);
    color: #fff;
  }

  .reply-chat__message--received .reply-chat__bubble {
    background: var(--color-surface-muted);
    color: var(--color-text);
  }

  .reply-chat__meta {
    font-size: 11px;
    color: var(--color-text-muted);
    margin-top: 2px;
  }

  .reply-chat__attachment-placeholder {
    color: var(--color-disabled);
    font-size: 12px;
    padding: 8px 0;
    border-top: 1px dashed var(--color-border);
    margin-top: 8px;
  }

  .reply-chat__composer {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-top: 8px;
  }

  .reply-chat__composer textarea {
    width: 100%;
    font-family: inherit;
  }

  .company-list__status-undo-bar {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 16px;
    padding: 12px;
    border: 1px solid var(--color-border);
    border-radius: 4px;
  }

  /* 一括AI分析中は画面全体をロックする（Sprint6 Step10）。button/input/select等は
     JS側でdisabledにするが、<a>リンク等disabledが効かない要素も含めて操作不可にするため
     pointer-events:noneも併用する。 */
  .company-list.is-locked {
    pointer-events: none;
  }

  .ai-summary-cell {
    max-width: 220px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  /* クリックで全文表示できるセルのみポインターカーソルにする（追加依頼）。
     titleは常に全文と同期しているため、空でない場合のみ表示対象。 */
  .ai-summary-cell[title]:not([title='']) {
    cursor: pointer;
  }

  .company-table__ai-actions {
    display: flex;
    gap: 8px;
    white-space: nowrap;
  }

  .company-table__ai-actions .button {
    padding: 6px 10px;
    font-size: 12px;
  }

  .company-table__ai-actions .button--loading {
    padding-left: 26px;
  }

  .company-table__ai-actions .button--loading::before {
    left: 8px;
    width: 12px;
    height: 12px;
    margin-top: -6px;
  }

  .modal-overlay {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: rgba(0, 0, 0, 0.5);
    align-items: center;
    justify-content: center;
    z-index: 100;
    padding: 16px;
  }

  /* [hidden]の既定スタイル（display: none）は優先度の低いUAスタイルのため、
     このセレクタでdisplay: flexを付けないと、常にdisplay: flexが指定された状態で
     hidden属性を付けても非表示にならない（閉じるボタン等が効かなくなる）。 */
  .modal-overlay:not([hidden]) {
    display: flex;
  }

  .modal {
    background: var(--color-bg);
    border-radius: 8px;
    padding: 24px;
    max-width: 560px;
    width: 100%;
    max-height: 90vh;
    overflow-y: auto;
    position: relative;
  }

  .modal h2 {
    margin-top: 0;
    font-size: 16px;
  }

  .modal label {
    display: block;
    margin-top: 12px;
    margin-bottom: 4px;
    color: var(--color-text-muted);
  }

  .modal input[type='text'],
  .modal textarea {
    width: 100%;
    font-family: inherit;
  }

  .modal__close {
    position: absolute;
    top: 16px;
    right: 16px;
    background: none;
    border: none;
    font-size: 20px;
    cursor: pointer;
    color: var(--color-text-muted);
  }

  .mail-history-item {
    padding: 8px 0;
    border-bottom: 1px solid var(--color-border);
  }

  .mail-history-item p {
    margin: 4px 0;
  }

  .mail-history-thread {
    padding: 16px 0;
    border-top: 3px double var(--color-border);
  }

  .mail-history-thread:first-child {
    border-top: none;
  }

  .mail-history-subject {
    margin: 0 0 12px;
  }

  .mail-history-direction {
    margin: 12px 0 2px;
  }

  .mail-history-date {
    margin: 0 0 4px;
    color: var(--color-text-muted);
  }

  .mail-history-body {
    white-space: pre-wrap;
    word-break: break-word;
    margin: 0 0 8px;
  }

  .mail-history-message-divider {
    border: none;
    border-top: 1px solid var(--color-border);
    margin: 12px 0;
  }

  .templates__section {
    margin-bottom: 40px;
  }

  .templates__section-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
  }

  .templates__section-header h2 {
    font-size: 16px;
    margin: 0;
  }

  .templates__placeholder-hint {
    color: var(--color-text-muted);
    font-size: 12px;
  }
